<!-- select-search.component.html -->
<ng-select 
  [name]="name"
  [(ngModel)]="value"
  [class]="cssClass + ' w-100'"
  [placeholder]="placeholder"
  [clearable]="clearable"
  [disabled]="disabled"
  [loading]="isLoading || loading"
  [searchable]="true"
  [notFoundText]="'Buscar registros...'"
  (search)="onSearch($event.term)"
  (ngModelChange)="onSelectionChange($event)">
  
  <!-- Solo mostrar opciones cuando hay datos -->
  @for (item of filteredItems; track getItemValue(item) || $index) {
    <ng-option 
      [value]="getItemValue(item)">
      {{ getDisplayText(item) }}
    </ng-option>
  }
  
  <!-- Mensaje personalizado cuando no hay resultados Y no está cargando -->
  @if (filteredItems.length === 0 && !isLoading && searchTerm.length > 0) {
    <ng-option 
      [value]="null" 
      [disabled]="true">
      Buscar registros
    </ng-option>
  }
  
  <!-- Mensaje cuando está cargando -->
  @if (isLoading) {
    <ng-option 
      [value]="null" 
      [disabled]="true">
      Buscando...
    </ng-option>
  }
  
</ng-select>
