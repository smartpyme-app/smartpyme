<button (click)="openModal(importar)" class="btn btn-default tcla-F4" title="Importar {{ nombre }} desde Excel">
    <img src="/assets/icons/upload.png" class="icon">
</button>

<ng-template #importar>
  <div class="modal-header text-center">
    <h3 class="modal-title">Importar {{ nombre }}</h3>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
        <form #form="ngForm" class="text-center" (ngSubmit)="onSubmit()" enctype="multipart/form-data">
        <div class="row mb-4">
            <div class="col-md-12 text-center">
              <div class="alert alert-info">
                <p>Seleccionar un archivo de Excel con el listado de sus {{ nombre }}. <br>
                Puede descargar la plantilla acá: <a href="{{ apiService.baseUrl + '/docs/' + nombre.toLowerCase() + '-format.xlsx'}}" target="_blank">Aquí</a>
                </p>
              </div>
            </div>
            
              <div class="mb-5 form-group col-md-12 text-center">
                <input type="file" class="form-control" name="file"  (change)="setFile($event)" required>
              </div>

              <div class="d-grid mt-3">
                  <button type="submit" class="btn btn-primary btn-block" [disabled]="!form.form.valid || loading">
                      <span *ngIf="!loading">Importar</span>
                      <span *ngIf="loading">Importando...</span>
                  </button>
              </div>
        </div>
        </form>
  </div>
</ng-template>
