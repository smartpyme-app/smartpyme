<div class="form-group col-sm-12">
    <label for="cantidad">* Nombre:</label>
    <form autocomplete="off" class="buscador">
        <input id="proveedor" type="text" name="proveedor.nombre" class="form-control" placeholder="Nombre" [(ngModel)]="proveedor.nombre" focus="true" id="example">
        <ul class="list-group info">
          @if (searching) {
            <a href="javascript:void(0);" class="list-group-item text-primary"> Buscando... </a>
          }
          @if (!searching && proveedores?.data?.length == 0) {
            <a href="javascript:void(0);" class="list-group-item text-warning"> Ningun registro encontrado </a>
          }
        </ul>
        @if (proveedores?.total > 0) {
          <ul class="list-group opciones">
            @for (proveedor of proveedores?.data; track proveedor.id || $index) {
              <a href="javascript:void(0);" class="list-group-item" (click)="selectCliente(proveedor)">
                {{proveedor.nombre}} - <small>{{proveedor.registro}}</small>
              </a>
            }
          </ul>
        }
    </form>
</div>
