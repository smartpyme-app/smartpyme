<button type="button" class="btn btn-primary w-100" (click)="openModal(mfilter)">
    @if (!downloading) {
      <span>Descargar inventario</span>
    }
    @if (downloading) {
      <span>Descargando...</span>
    }
</button>

<ng-template #mfilter>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center">Fecha</h2>
    </div>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-notificaciones-container></app-notificaciones-container>
    <form autocomplete="off" (ngSubmit)="descargar()">
        <p class="alert bg-info">Acá puedes descargar los detalles de inventario a una fecha determinada en un archivo de Excel.</p>
        <div class="row">
            <div class="form-group col-sm-12">
                <label for="filtros.fecha">¿Hasta que fecha desea descargar el inventario?:</label>
                <input type="date" [(ngModel)]="filtros.fecha" class="form-control" name="filtros.fecha">
            </div>
            <div class="form-group col-sm-12">
                <label for="filtros.sucursal_id">Bodega:</label>
                <select [(ngModel)]="filtros.id_bodega" class="form-select" name="filtros.id_bodega">
                    <option value="">Todas</option>
                    @for (bodega of bodegas; track bodega.id) {
                      <option [value]="bodega.id">{{ bodega.nombre }}</option>
                    }
                </select>
            </div>            
        </div>
        
        <div class="d-grid mt-3">
            <button type="submit" [disabled]="downloading" class="btn btn-primary">
                @if (!downloading) {
                  <span>Descargar</span>
                }
                @if (downloading) {
                  <span>Descargando...</span>
                }
            </button>
        </div>
    </form>
  </div>
</ng-template>
