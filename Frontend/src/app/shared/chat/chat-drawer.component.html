<div class="offcanvas offcanvas-bottom custom-chat-height" tabindex="-1" id="chatOffcanvas" aria-labelledby="chatOffcanvasLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="chatOffcanvasLabel">Asistente Virtual</h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <div class="chat-messages">
        <div *ngFor="let message of messages" 
             class="message mb-3" 
             [ngClass]="{'user-message': message.sender === 'user', 'bot-message': message.sender === 'bot'}">
          <div class="message-content p-3">
            <p class="mb-0">{{ message.text }}</p>
          </div>
        </div>
      </div>
    </div>
    <div class="offcanvas-footer p-3 border-top">
      <div class="input-group">
        <input type="text" class="form-control" 
               placeholder="Escribe tu mensaje..." 
               [(ngModel)]="newMessage" 
               (keyup.enter)="sendMessage()">
        <button class="btn btn-primary" (click)="sendMessage()">
          <i class="fa fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>
