<div class="offcanvas offcanvas-bottom custom-chat-height" tabindex="-1" id="chatOffcanvas" aria-labelledby="chatOffcanvasLabel">
  <div class="offcanvas-header">
    <img src="/assets/img/logo.png" alt="Logo" class="me-2" style="width: 80px; height: 24px;">
    <h6 class="offcanvas-title" id="chatOffcanvasLabel">Lucas IA</h6>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    <div class="chat-messages" #chatContainer>
      <div *ngFor="let message of messages" 
           class="message mb-3" 
           [ngClass]="{'user-message': message.sender === 'user', 'bot-message': message.sender === 'bot'}">
        <!-- Avatar para mensajes del bot -->
        <div *ngIf="message.sender === 'bot'" class="avatar-container">
          <img src="/assets/avatares/bot-avatar.png" alt="Bot" class="bot-avatar">
        </div>
        <div class="message-content p-3">
          <div class="mb-0" [innerHTML]="message.text | safeHtml"></div>
          
          <!-- Sugerencias -->
          <div *ngIf="message.suggestions && message.suggestions.length > 0" class="suggestions-container mt-2">
            <div *ngFor="let suggestion of message.suggestions" 
                 class="suggestion-chip" 
                 tooltip="{{ suggestion }}"
                 (click)="handleSuggestionClick(suggestion)">
              {{ suggestion }}
            </div>
          </div>
        </div>
        <!-- Avatar para mensajes del usuario (opcional) -->
        <div *ngIf="message.sender === 'user'" class="avatar-container user-avatar-container">
          <div class="user-avatar">
            <i class="fa fa-user"></i>
          </div>
        </div>
      </div>
      
      <!-- Indicador de "pensando..." -->
      <div *ngIf="isLoading" class="message mb-3 bot-message">
        <div class="avatar-container">
          <img src="/assets/avatares/bot-avatar.png" alt="Bot" class="bot-avatar">
        </div>
        <div class="message-content p-3">
          <div class="thinking-indicator">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="offcanvas-footer p-3 border-top">
    <div class="input-group">
      <input type="text" class="form-control" 
             placeholder="Escribe tu mensaje..." 
             [(ngModel)]="newMessage" 
             (keyup.enter)="sendMessage()">
      <button class="btn btn-primary" (click)="sendMessage()">
        <i class="fa fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>
