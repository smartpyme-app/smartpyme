<button type="button" class="btn btn-default" (click)="openModal(mcategoria)" tooltip="Crear nueva categoria">
    <i class="fa fa-plus"></i>
</button>


<ng-template #mcategoria>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center no-margin">Categoria</h2>
    </div>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form autocomplete="off" (ngSubmit)="onSubmit()">
        <app-notificaciones-container></app-notificaciones-container>
        <div class="row">
            <div class="form-group col-12">
                <label for="categoria.nombre">Nombre</label>
                <input type="text" class="form-control" [(ngModel)]="categoria.nombre" name="categoria.nombre" focus="true">
            </div>
            <div class="form-group col-md-12">
                <div class="form-switch bg-light-info rounded">
                  <label for="enable">Activo</label>
                  <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="categoria.enable" name="enable">
                </div>
            </div>
            <div class="form-group col-12">
                <label for="categoria.descripcion">Descripción</label>
                <textarea name="categoria.descripcion" class="form-control" cols="30" rows="3" [(ngModel)]="categoria.descripcion"></textarea>
            </div>
        </div>
        <div class="d-grid">
            <button type="submit" [disabled]="loading" class="btn btn-primary btn-block">
                <span *ngIf="!loading">Añadir</span>
                <span *ngIf="loading">Añadiendo...</span>
            </button>
        </div>
    </form>
  </div>
</ng-template>
