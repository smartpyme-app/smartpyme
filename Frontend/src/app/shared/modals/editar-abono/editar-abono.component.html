<form (ngSubmit)="onSubmit()" autocomplete="off">
    <div class="row">
        <app-notificaciones-container></app-notificaciones-container>

        <div class="form-group col-md-6">
            <label for="correlativo">Correlativo:</label>
            <input type="text" class="form-control" [(ngModel)]="abono.correlativo" name="correlativo">
        </div>

        <div class="form-group col-md-6">
            <label for="fecha">Fecha:</label>
            <input type="date" class="form-control" [(ngModel)]="abono.fecha" name="fecha" required>
        </div>

        <div class="form-group col-md-6">
            <label for="concepto">Concepto:</label>
            <input type="text" class="form-control" [(ngModel)]="abono.concepto" name="concepto" required>
        </div>

        <div class="form-group col-md-6">
            <label for="estado">Estado:</label>
            <select name="estado" [(ngModel)]="abono.estado" class="form-select" required>
                <option value="Confirmado">Confirmado</option>
                <option value="Cancelado">Cancelado</option>
            </select>
        </div>

        <div class="form-group col-md-6">
            <label for="forma_pago">Forma de pago:</label>
            <select name="forma_pago" (change)="cambioMetodoDePago()" [(ngModel)]="abono.forma_pago" class="form-select" required>
                <option [value]="forma.nombre" *ngFor="let forma of formaPagos">{{ forma.nombre }}</option>
            </select>
        </div>

        <div class="form-group col-md-6">
            <label for="total">Total:</label>
            <div class="input-group">
                <div class="input-group-text">{{ apiService.auth_user().empresa.currency?.currency_symbol || '$' }}</div>
                <input type="number" class="form-control" [(ngModel)]="abono.total" name="total" step="0.01" min="0" required>
            </div>
        </div>

        <div class="form-group col-md-12" *ngIf="mostrarBanco()">
            <label for="detalle_banco">Banco</label>
            <select name="detalle_banco" [(ngModel)]="abono.detalle_banco" class="form-select">
                <option value="">Seleccione aquí</option>
                <ng-container *ngIf="apiService.isModuloBancos()">
                    <option [value]="banco.nombre_banco" *ngFor="let banco of bancos">{{ banco.nombre_banco }} - {{ banco.numero }}</option>
                </ng-container>
                <ng-container *ngIf="!apiService.isModuloBancos()">
                    <option [value]="banco.nombre" *ngFor="let banco of bancos">{{ banco.nombre }}</option>
                </ng-container>
            </select>
        </div>

        <div class="form-group col-md-12" *ngIf="mostrarReferencia()">
            <label for="referencia">Referencia:</label>
            <input type="text" class="form-control" [(ngModel)]="abono.referencia" name="referencia">
        </div>
    </div>

    <div class="d-grid mt-3">
        <button type="submit" class="btn btn-primary" [disabled]="saving">
            <span *ngIf="!saving">Guardar</span>
            <span *ngIf="saving">Guardando...</span>
        </button>
    </div>
</form>
