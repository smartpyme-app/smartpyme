<form (ngSubmit)="onSubmit()" autocomplete="off">
    <div class="row">
        <app-notificaciones-container></app-notificaciones-container>

        <div class="form-group col-md-6">
            <label>Fecha:</label>
            <input type="date" class="form-control" [(ngModel)]="abono.fecha" name="fecha">
        </div>

        <div class="form-group col-md-6">
            <label for="forma_pago">Forma de pago</label>
            <select name="forma_pago" [(ngModel)]="abono.forma_pago" class="form-select">
                <option [value]="forma.nombre" *ngFor="let forma of formaPagos">{{ forma.nombre }}</option>
            </select>
        </div>
        <div class="form-group col-md-12" *ngIf="abono.forma_pago != 'Efectivo'">
            <label for="detalle_banco">Banco</label>
            <select name="detalle_banco" [(ngModel)]="abono.detalle_banco" class="form-select">
                <option value="">Seleccione aquí</option>
                <option [value]="banco.nombre" *ngFor="let banco of bancos">{{ banco.nombre }}</option>
            </select>
        </div>
        <div class="form-group col-md-12" *ngIf="abono.forma_pago != 'Efectivo'">
            <label for="referencia">Referencia:</label>
            <input type="text" class="form-control" [(ngModel)]="abono.referencia" name="referencia">
        </div>

        <div class="form-group col-md-12">
            <table class="table table-bordered">
                <tbody>
                    <tr>
                        <th colspan="3" class="text-center">Datos de la compra</th>
                    </tr>
                    <tr>
                        <th width="33%">Total</th>
                        <th width="33%">Abonado</th>
                        <th width="33%">Saldo</th>
                    </tr>
                    <tr>
                        <td>{{ compra.total | currency}}</td>
                        <td>{{ (compra.total - compra.saldo) | currency}}</td>
                        <td>{{ compra.saldo | currency}}</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="form-group col-md-12 text-center">
            <div class="btn-group" role="group">
              <input type="radio" class="btn-check" (change)="setTotal(compra.saldo)" name="btnradio" id="btnradio1" autocomplete="off" checked>
              <label class="btn btn-outline-primary" for="btnradio1">Pago total</label>

              <input type="radio" class="btn-check" (change)="setTotal(null)" name="btnradio" id="btnradio2" autocomplete="off">
              <label class="btn btn-outline-primary" for="btnradio2">Abono</label>
            </div>
        </div>

        <div class="form-group col-md-12">
            <label>Total:</label>
            <div class="input-group">
                <div class="input-group-text">$</div>
                <input type="number" class="form-control" id="total" [(ngModel)]="abono.total" name="total">
            </div>
        </div>

    </div>
    <div class="d-grid mt-3">
        <button type="submit" class="btn btn-primary btn-block" [disabled]="saving">
            <span *ngIf="!saving">Guardar</span>
            <span *ngIf="saving">Guardando...</span>
        </button>
    </div>

</form>
