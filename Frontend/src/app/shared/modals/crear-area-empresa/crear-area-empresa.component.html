
<button type="button" class="btn btn-default tcla-F1" (click)="openModal(mArea)">
    <i *ngIf="!id_area" tooltip="Crear nueva área (F1)" class="fa fa-plus"></i>
    <i *ngIf="id_area" tooltip="Editar área (F1)" class="fa fa-pencil-alt"></i>
</button>

<ng-template #mArea>
    <div class="modal-header justify-content-between">
        <h3 class="modal-title">
            <span *ngIf="!id_area">Nueva área de empresa</span>
            <span *ngIf="id_area">Editar área de empresa</span>
        </h3>
        <button class="btn btn-light text-danger" (click)="modalRef.hide(); alertService.modal = false;">
            Cancelar <i class="fa fa-close"></i>
        </button>
    </div>
    <div class="modal-body p-3">
        <app-notificaciones-container></app-notificaciones-container>
        <form (ngSubmit)="onSubmit()">
            <div class="row">
                <div class="form-group col-md-12">
                    <label for="id_departamento">Departamento:</label>
                    <div class="input-group flex-nowrap">
                        <ng-select name="id_departamento" 
                                   placeholder="Seleccione departamento" 
                                   [(ngModel)]="area.id_departamento" 
                                   class="form-select p-0"
                                   bindLabel="nombre"
                                   bindValue="id"
                                   [items]="departamentos"
                                   required>
                        </ng-select>
                        <app-crear-departamento [id_departamento]="area.id_departamento" (update)="setDepartamento($event)"></app-crear-departamento>
                    </div>
                </div>

                <div class="form-group col-md-12">
                    <label for="nombre">Nombre del área:</label>
                    <input type="text" 
                           class="form-control" 
                           name="nombre" 
                           [(ngModel)]="area.nombre"
                           placeholder="Ingrese el nombre del área"
                           required>
                </div>
                
                <div class="form-group col-md-12">
                    <label for="descripcion">Descripción:</label>
                    <textarea class="form-control" 
                              placeholder="Descripción del área (opcional)" 
                              [(ngModel)]="area.descripcion" 
                              name="descripcion" 
                              cols="30" 
                              rows="3"></textarea>
                </div>

                <div class="form-group col-md-6">
                    <label for="estado">Estado:</label>
                    <select class="form-select" name="estado" [(ngModel)]="area.estado">
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                </div>
            </div>
            
            <div class="row">          
                <div class="form-group col-md-12 mt-3">
                    <button type="submit" 
                            [disabled]="saving || !area.nombre || !area.id_departamento" 
                            class="btn btn-primary float-end tcla-F10" 
                            tooltip="Guardar (F10)">
                        <span *ngIf="!saving">
                            Guardar área 
                            <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2">
                        </span>
                        <span *ngIf="saving">Guardando...</span>
                    </button>
                </div>
            </div>
        </form>
    </div>
</ng-template>
