<form name="form" (ngSubmit)="onSubmit()">
        <div class="row">
            <app-notificaciones-container></app-notificaciones-container>
            <div class="form-group col-md-12">
              <label for="descripcion">Descripción</label>
              <input type="text" placeholder="Escribe aquí" class="form-control"  [(ngModel)]="evento.descripcion" name="descripcion">
            </div>

            <div class="form-group col-md-6 col-lg-6">
                <label for="id_usuario">Usuario</label>
                <ng-select name="id_usuario" [(ngModel)]="evento.id_usuario" class="form-select p-0">
                    <ng-option [value]="usuario.id" *ngFor="let usuario of usuarios">
                        {{ usuario.name }}
                    </ng-option>
                </ng-select>
            </div>

            <div class="form-group col-md-6">
                <label for="">Cliente</label>
                <div class="input-group flex-nowrap">
                    <ng-select name="id_cliente" [(ngModel)]="evento.id_cliente" class="form-select p-0">
                        <ng-option value=""> Seleccione aquí </ng-option>
                        <ng-option *ngFor="let cliente of clientes" [value]="cliente.id">
                            {{ cliente.tipo == 'Persona' ? cliente.nombre_completo : cliente.nombre_empresa }}
                        </ng-option>
                    </ng-select>
                    <app-crear-cliente [id_cliente]="evento.id_cliente" (update)="setCliente($event)"></app-crear-cliente>
                </div>
            </div>

            <div class="form-group col-md-4">
              <label for="inicio">Fecha inicio</label>
              <input type="datetime-local" class="form-control" (change)="setTime()" name="inicio" [(ngModel)]="evento.inicio">
            </div>

            <div class="form-group col-md-4">
              <label for="duracion">Duración</label>
              <select name="duracion" (change)="setTime()" [(ngModel)]="evento.duracion" class="form-select" required>
                <option value="15 minutos">15 minutos</option>
                <option value="30 minutos">30 minutos</option>
                <option value="1 hora" selected>1 hora</option>
                <option value="2 horas">2 horas</option>
                <option value="3 horas">3 horas</option>
                <option value="5 horas">5 horas</option>
                <option value="8 horas">8 horas</option>
                <option value="12 horas">12 horas</option>
              </select>
            </div>

            <div class="form-group col-md-4">
              <label for="fin">Finaliza</label>
              <input type="datetime-local" class="form-control" name="fin" [(ngModel)]="evento.fin">
            </div>
            

            <div class="form-group col-md-12">
                <label for="productoSeleccionado">Productos y servicios</label>
                <ng-select placeholder="Selecciona un aquí" name="productoSeleccionado" [(ngModel)]="productoSeleccionado" (change)="agregarDetalle()" class="form-select p-0">
                    <ng-option [value]="producto" *ngFor="let producto of productos">
                        {{ producto.nombre }}
                    </ng-option>
                </ng-select>
                <table *ngIf="evento?.productos?.length > 0" class="table table-bordered mt-3">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th width="200px">Cantidad</th>
                            <th width="50px"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let det of evento?.productos; let i = index">
                            <td> {{ det.nombre_producto  }} </td>
                            <td>
                                <input type="number" [(ngModel)]="det.cantidad" name="cantidad{{det.id}}" class="form-control">
                            </td>
                            <td><button class="btn btn-danger" (click)="eliminarDetalle(i)">Eliminar</button></td>
                        </tr>
                    </tbody>
                </table>    
            </div>
          
            <div class="form-group col-md-12">
              <label class="form-label font-weight-bold">Detalles del evento</label>
                <textarea class="form-control" placeholder="Escribe aquí (Opcional)" name="detalles" [(ngModel)]="evento.detalles" rows="2"></textarea>
            </div>

            <div class="form-group col-md-6 col-lg-4">
                  <label class="form-label font-weight-bold">Estado</label>
                  <select name="tipo" [(ngModel)]="evento.tipo"  class="form-control form-select">
                      <option value="Sin confirmar">Sin confirmar</option>
                      <option value="Confirmado">Confirmado</option>
                      <option value="Cancelado">Cancelado</option>
                      <option value="Pagado">Pagado</option>
                      <option value="Pendiente">Pendiente</option>
                  </select>
            </div>

            <div class="form-group col-md-6 col-lg-4">
                  <label class="form-label font-weight-bold">Se repite</label>
                  <select name="frecuencia" [(ngModel)]="evento.frecuencia" (change)="setFrecuenciaFin()" class="form-control form-select" id="frecuencia">
                      <option value="">No</option>
                      <option value="DAILY">Diario</option>
                      <option value="WEEKLY">Semanal</option>
                      <option value="MONTHLY">Mensual</option>
                      <option value="YEARLY">Anual</option>
                  </select>
            </div>

            <div class="form-group col-md-6 col-lg-4" *ngIf="evento.frecuencia">
              <label for="veces">Repetir</label>
              <div class="input-group">
                    <input type="number" class="form-control" name="veces" (keyup)="setFrecuenciaFin()" (change)="setFrecuenciaFin()" [(ngModel)]="evento.veces">
                    <span class="input-group-text">Veces</span>
              </div>
            </div>

            <!-- <div class="form-group col-md-6 col-lg-2" *ngIf="evento.frecuencia">
              <label for="frecuencia_fin">Terminar de repetir</label>
              <input type="date" class="form-control" name="frecuencia_fin" [(ngModel)]="evento.frecuencia_fin">
            </div> -->

            <div class="d-grid mt-4">
                <button [disabled]="saving" class="btn btn-primary btn-block">
                    <span *ngIf="!saving">Agregar</span>
                    <span *ngIf="saving">Agregando...</span>
                </button>
            </div>
        </div>
    </form>
