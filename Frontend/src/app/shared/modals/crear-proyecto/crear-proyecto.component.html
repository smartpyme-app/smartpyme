<button type="button" class="btn btn-default tcla-F1" (click)="openModal(mCliente)">
    <i *ngIf="!id_proyecto" tooltip="Crear nuevo proyecto (F1)" class="fa fa-plus"></i>
    <i *ngIf="id_proyecto" tooltip="Editar proyecto (F1)" class="fa fa-pencil-alt"></i>
</button>

<ng-template #mCliente>
    <div class="modal-header justify-content-between">
        <h3 class="modal-title">
            <span *ngIf="!id_proyecto">Nuevo proyecto</span>
            <span *ngIf="id_proyecto">Editar proyecto</span>
        </h3>
        <button class="btn btn-light text-danger" (click)="modalRef.hide(); alertService.modal = false;">Cancelar <i class="fa fa-close"></i></button>
    </div>
    <div class="modal-body p-3">
        <app-notificaciones-container></app-notificaciones-container>
        <form (ngSubmit)="onSubmit()">
            <div class="row">
                <div class="form-group col-md-12">
                    <label for="nombre">Nombre:</label>
                    <input type="text" class="form-control" name="nombre" [(ngModel)]="proyecto.nombre">
                </div>
                <div class="form-group col-md-4">
                    <label for="">Fecha Inicio:</label>
                    <input type='date' class="form-control" name="fecha_inicio" [(ngModel)]="proyecto.fecha_inicio"/>
                </div>
                <div class="form-group col-md-4">
                    <label for="">Fecha Fin:</label>
                    <input type='date' class="form-control" name="fecha_fin" [(ngModel)]="proyecto.fecha_fin"/>
                </div>
                <div class="form-group col-md-4">
                    <label for="estado">Estado:</label>
                    <select class="form-select" name="estado" [(ngModel)]="proyecto.estado">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En proceso">En proceso</option>
                        <option value="Facturado">Facturado</option>
                    </select>
                </div>
                <div class="form-group col-md-12">
                    <label for="descripcion">Descripción:</label><br>
                    <textarea class="form-control" placeholder="Escribe aquí" [(ngModel)]="proyecto.descripcion" name="descripcion" cols="30" rows="3"></textarea>
                </div>

            </div>
            <div class="row">          
                <div class="form-group col-md-12 mt-3">
                    <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F10" tooltip="Guardar (F10)">
                        <span *ngIf="!saving">Guardar proyecto <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
                        <span *ngIf="saving">Guardando...</span>
                    </button>
                </div>
            </div>
        </form>
    </div>
</ng-template>
