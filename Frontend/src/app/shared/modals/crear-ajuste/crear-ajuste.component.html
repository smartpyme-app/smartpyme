<a class="btn btn-light" (click)="openModalAjuste(majuste)" tooltip="Ajustar stock de inventario">
    <i class="fa fa-pencil-alt"></i>
</a>

<ng-template #majuste>
  <div class="modal-header d-block text-center">
    <h5 class="modal-title mb-0">Ajuste de stock </h5>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form (ngSubmit)="onSubmit()" autocomplete="off">
        <div class="row">
            <app-notificaciones-container></app-notificaciones-container>
            <p><b>Sucursal:</b> {{ inventario.nombre_sucursal }}</p>
            <p><b>Producto:</b> {{ producto.nombre }}</p>
            <p><span class="badge bg-info">{{ ajuste.stock_actual | number:'1.0' }} unidades</span></p>
            <div class="form-group col-md-12">
                <label for="stock_real">Ingrese la cantidad que debe haber en existencias:</label>
                <input type="text" oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');" class="form-control text-center" [(ngModel)]="ajuste.stock_real" (change)="calAjuste()" (keyup)="calAjuste()" name="stock_real" focus="true">
            </div>
            
            <div class="form-groumdcol-xs-12" *ngIf="ajuste.stock_real">
                <label for="ajuste">Se realizá un ajuste de:</label>
                <p *ngIf="ajuste.stock_real"> {{ ajuste.ajuste }}</p>
                <p *ngIf="!ajuste.stock_real"> 0</p>
            </div>

            <div class="form-group col-md-12">
                <label for="concepto">Nota del ajuste:</label>
                <input type="text" class="form-control" [(ngModel)]="ajuste.concepto" name="concepto">
            </div>

        </div>
        <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || !ajuste.stock_real">
                <span *ngIf="!loading">Guardar</span>
                <span *ngIf="loading">Guardando...</span>
            </button>
        </div>

    </form>
  </div>
</ng-template>
