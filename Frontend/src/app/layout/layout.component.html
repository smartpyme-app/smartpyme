

<div class="d-flex" style="min-height: 100vh; background: #FDFBFF;">
  
  <app-sidebar-admin *ngIf="usuario.id_empresa == 2 && !usuario.empresa.licencia"></app-sidebar-admin>
  <app-sidebar *ngIf="usuario.id_empresa != 2 && !usuario.empresa.licencia && apiService.isAdmin()"></app-sidebar>
  <app-sidebar-ventas *ngIf="usuario.id_empresa != 2 && !usuario.empresa.licencia && usuario.tipo == 'Ventas'"></app-sidebar-ventas>
  <app-sidebar-servicios *ngIf="usuario.id_empresa != 2 && !usuario.empresa.licencia && usuario.tipo == 'Citas'"></app-sidebar-servicios>
  <app-sidebar-organizaciones *ngIf="usuario.id_empresa != 2 && usuario.empresa.licencia"></app-sidebar-organizaciones>

  <div class="content p-2 px-lg-4 py-lg-5 position-relative overflow-hidden">
    <div class="container-fluid p-0 m-0">
      <div *ngIf="usuario.empresa.estado_plan.estado == 'Prueba'" class="alert bg-danger rounded-0  m-0 p-2 text-center">
          <a href="/suscripcion" class="text-decoration-none text-dark">Estás en tu prueba gratuita, faltan {{ usuario.empresa.estado_plan.dias_faltantes }} días para que termine.
          Puedes <span class="text-dark fw-bold"> puedes ver tu suscripción acá.</span></a>
      </div>
    </div>
    <app-header></app-header>
    <app-notificaciones-container *ngIf="!alertService.modal"></app-notificaciones-container>
    <router-outlet></router-outlet>
  </div>
</div>

<app-footer></app-footer>
