<section class="d-flex justify-content-between bg-white p-4 rounded mb-3">
    <h2 class="page-heading">Inteligencia de Negocios</h2>
</section>

<section class="bg-white rounded p-4 mb-3">

    <ng-template #contenidoDashboardV1>
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="alert alert-info border-0">
                    <p class="mb-0"><b>Importante:</b> Los reportes se actualizan durante la noche.</p>
                </div>
            </div>
            <div class="col-md-12" *ngIf="dashboards.total == 0">
                Aún no hay reportes configurados. Cuando los haya, aparecerán aquí.
            </div>
            <div class="col-md-12" *ngFor="let dashboard of dashboards.data">
                <div [innerHTML]="dashboard.codigo_embed"></div>
            </div>
        </div>
    </ng-template>

    <!-- Sin V2: solo dashboard clásico -->
    <ng-container *ngIf="verificacionFuncionalidadLista && !tieneInteligenciaNegociosV2">
        <ng-container *ngTemplateOutlet="contenidoDashboardV1"></ng-container>
    </ng-container>

    <!-- Con V2: pestañas anidadas V1 / V2 -->
    <ng-container *ngIf="verificacionFuncionalidadLista && tieneInteligenciaNegociosV2">
        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-v1" data-bs-toggle="tab"
                    data-bs-target="#panel-v1" type="button" role="tab">
                    V1
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-v2" data-bs-toggle="tab"
                    data-bs-target="#panel-v2" type="button" role="tab">
                    V2
                </button>
            </li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade" id="panel-v1" role="tabpanel" tabindex="0">
                <ng-container *ngTemplateOutlet="contenidoDashboardV1"></ng-container>
            </div>
            <div class="tab-pane fade show active" id="panel-v2" role="tabpanel" tabindex="0">
                <app-dashboard></app-dashboard>
            </div>
        </div>
    </ng-container>

</section>
