<div class="d-flex justify-content-between bg-white rounded p-3 mb-3">
    <h3 (click)="loadAll()">{{ paquete.id ? 'Editar ' : 'Crear ' }} Paquete</h3>
    <button class="btn btn-light text-danger" routerLink="/paquetes"><i class="fa fa-arrow-left"></i> Regresar</button>
</div>

<form autocomplete="off" (ngSubmit)="onSubmit()">
    <div class="bg-white rounded p-3">
        <div class="row">
            <div class="form-group col-md-4 col-lg-3">
                <label for="">Fecha:</label>
                <input type='date' class="form-control" name="fecha" [(ngModel)]="paquete.fecha"/>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="id_usuario">Usuario:</label>
                <select name="id_usuario" [(ngModel)]="paquete.id_usuario" class="form-select">
                    <option [value]="usuario.id" *ngFor="let usuario of usuarios">
                        {{ usuario.name }}
                    </option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="id_sucursal">Sucursal:</label>
                <select name="id_sucursal" [(ngModel)]="paquete.id_sucursal" class="form-select">
                    <option [value]="sucursal.id" *ngFor="let sucursal of sucursales">
                        {{ sucursal.nombre }}
                    </option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="estado">Estado:</label>
                <select class="form-select" name="estado" [(ngModel)]="paquete.estado">
                    <option value="En bodega">En bodega</option>
                    <option value="En proceso">En proceso</option>
                    <option value="Entregado">Entregado</option>
                </select>
            </div>
            <div class="form-group col-md-6 col-lg-4">
                <label for="id_cliente" class="w-100">Consignatario:</label>
                <div class="input-group flex-nowrap">
                    <ng-select name="id_cliente" [(ngModel)]="paquete.id_cliente" class="form-select p-0">
                        <ng-option value="">Seleccione aquí</ng-option>
                        <ng-option *ngFor="let cliente of clientes" [value]="cliente.id">
                            {{ cliente.tipo == 'Empresa' ? cliente.nombre_empresa : cliente.nombre_completo }}
                        </ng-option>
                    </ng-select>
                    <app-crear-proveedor (update)="setProveedor($event)"></app-crear-proveedor>
                </div>
            </div>
            <div class="form-group col-md-4 col-lg-4">
                <label for="transportista">Transportista:</label>
                <input type="text" class="form-control" name="transportista" [(ngModel)]="paquete.transportista" placeholder="Escriba aquí" />
            </div>
            <!-- <div class="form-group col-md-6">
                <label for="id_proveedor" class="w-100">Transportista:</label>
                <div class="input-group flex-nowrap">
                    <ng-select name="id_proveedor" [(ngModel)]="paquete.id_proveedor" class="form-select p-0">
                        <ng-option value="">Seleccione aquí</ng-option>
                        <ng-option *ngFor="let proveedor of proveedores" [value]="proveedor.id">
                            {{ proveedor.tipo == 'Empresa' ? proveedor.nombre_empresa : proveedor.nombre_completo }}
                        </ng-option>
                    </ng-select>
                    <app-crear-proveedor (update)="setProveedor($event)"></app-crear-proveedor>
                </div>
            </div> -->
            <!-- <div class="form-group col-md-4 col-lg-4">
                <label for="consignatario">Consignatario:</label>
                <input type="text" class="form-control" name="consignatario" [(ngModel)]="paquete.consignatario" placeholder="Escriba aquí" />
            </div> -->
            <div class="form-group col-md-4 col-lg-4">
                <label for="transportador">Transportador:</label>
                <input type="text" class="form-control" name="transportador" [(ngModel)]="paquete.transportador" placeholder="Escriba aquí" />
            </div>

        </div>
     </div>
     <div class="bg-white rounded p-3 mb-3">
        <h6>Detalle del paquete</h6>
        <div class="row">
            <div class="form-group col-md-6 col-lg-5">
                <label for="wr">WR:</label>
                <input type="text" class="form-control" name="wr" [(ngModel)]="paquete.wr" placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="peso">Peso:</label>
                <div class="input-group">
                    <input type="number" class="form-control" name="peso" [(ngModel)]="paquete.peso" placeholder="Escriba aquí" />
                    <span class="input-group-text">Libras</span>
                </div>
            </div>
            <div class="form-group col-md-3 col-lg-2">
                <label for="piezas">Piezas:</label>
                <input type="number" class="form-control" name="piezas" [(ngModel)]="paquete.piezas" placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-3 col-lg-2">
                <label for="volumen">Volumen:</label>
                <input type="number" class="form-control" name="volumen" [(ngModel)]="paquete.volumen" placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-6">
                <label for="num_seguimiento">Num. seguimiento:</label>
                <input type="text" class="form-control" name="num_seguimiento" [(ngModel)]="paquete.num_seguimiento" placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-6">
                <label for="num_guia">Num. guía:</label>
                <input type="text" class="form-control" name="num_guia" [(ngModel)]="paquete.num_guia" placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-12">
                <label for="nota">Nota:</label>
                <input type="text" class="form-control" name="nota" [(ngModel)]="paquete.nota" placeholder="Escriba aquí" />
            </div>
        </div>
    </div>


    <div class="bg-white rounded p-3 mb-3">
        <div class="form-group col-sm-12 pt-2 pb-4">
            <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F8" tooltip="Procesar (F8)">
                <span *ngIf="!saving">Procesar paquete  <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
                <span *ngIf="saving">Procesando...</span>
            </button>
        </div>
    </div>
</form>
