<div class="d-flex justify-content-between bg-white rounded p-3 mb-3">
    <h3 (click)="loadAll()">{{ paquete.id ? 'Editar ' : 'Crear ' }} Paquete</h3>
    <button class="btn btn-light text-danger" routerLink="/paquetes"><i class="fa fa-arrow-left"></i> Regresar</button>
</div>

<form autocomplete="off" (ngSubmit)="onSubmit()">
    <div class="bg-white rounded p-3">
        <div class="row">
            <div class="form-group col-md-4 col-lg-2">
                <label for="">Fecha:</label>
                <input type='date' class="form-control" name="fecha" [(ngModel)]="paquete.fecha" />
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="id_usuario">Usuario:</label>
                <select name="id_usuario" [(ngModel)]="paquete.id_usuario" class="form-select">
                    <option [value]="usuario.id" *ngFor="let usuario of usuarios">
                        {{ usuario.name }}
                    </option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="id_usuario">Asesor:</label>
                <select name="id_asesor" [(ngModel)]="paquete.id_asesor" class="form-select">
                    <option [value]="usuario.id" *ngFor="let usuario of usuarios">
                        {{ usuario.name }}
                    </option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-2">
                <label for="id_sucursal">Sucursal:</label>
                <select name="id_sucursal" [(ngModel)]="paquete.id_sucursal" class="form-select">
                    <option [value]="sucursal.id" *ngFor="let sucursal of sucursales">
                        {{ sucursal.nombre }}
                    </option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-2">
                <label for="estado">Estado:</label>
                <select class="form-select" name="estado" [(ngModel)]="paquete.estado">
                    <option value="En bodega">En bodega</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="Facturado">Facturado</option>
                </select>
            </div>
            <div class="form-group col-md-6 col-lg-4">
                <label for="id_cliente" class="w-100">Cliente:</label>
                <div class="input-group flex-nowrap">
                    <ng-select name="id_cliente" [(ngModel)]="paquete.id_cliente" class="form-select p-0">
                        <ng-option value="">Seleccione aquí</ng-option>
                        <ng-option *ngFor="let cliente of clientes" [value]="cliente.id">
                            {{ cliente.tipo == 'Empresa' ? cliente.nombre_empresa : cliente.nombre_completo }}
                        </ng-option>
                    </ng-select>
                    <app-crear-cliente (update)="setProveedor($event)"></app-crear-cliente>
                </div>
            </div>
            <div class="form-group col-md-8">
                <label for="nota">Nota:</label>
                <input type="text" class="form-control" name="nota" [(ngModel)]="paquete.nota"
                    placeholder="Escriba aquí" />
            </div>
        </div>
    </div>
    <div class="bg-white rounded p-3 mb-3">
        <h6>Detalle del paquete</h6>

        <div class="row mb-2" *ngIf="tieneBoxful">
            <div class="form-group col-md-3 col-lg-2 without-label">
                <div class="form-switch border rounded">
                    <label for="es_fragil">¿Es frágil?</label>
                    <input class="form-check-input float-end" type="checkbox" role="switch" id="es_fragil"
                        name="es_fragil" [(ngModel)]="paquete.es_fragil">
                </div>
            </div>
        </div>


        <!-- Fila 2: Información de Rastreo y Logística -->
        <div class="row mb-3">
            <div class="form-group col-md-3 col-lg-2">
                <label for="wr">WR:</label>
                <input type="text" class="form-control" name="wr" [(ngModel)]="paquete.wr" placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-5 col-lg-4">
                <label for="num_seguimiento">Num. seguimiento:</label>
                <input type="text" class="form-control" name="num_seguimiento" [(ngModel)]="paquete.num_seguimiento"
                    placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="num_guia">Num. guía:</label>
                <input type="text" class="form-control" name="num_guia" [(ngModel)]="paquete.num_guia"
                    placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-6 col-lg-3">
                <label for="embalaje">Embalaje:</label>
                <input type="text" class="form-control" name="embalaje" [(ngModel)]="paquete.embalaje"
                    placeholder="Escriba aquí" />
            </div>
        </div>

        <!-- Fila 3: Dimensiones y Medidas Físicas -->
        <div class="row mb-3">
            <div class="form-group col-md-3 col-lg-2">
                <label for="peso">Peso:</label>
                <div class="input-group">
                    <input type="number" class="form-control" name="peso" [(ngModel)]="paquete.peso"
                        placeholder="Escriba aquí" />
                    <span class="input-group-text">Libras</span>
                </div>
            </div>
            <div class="form-group col-md-3 col-lg-2">
                <label for="piezas">Piezas:</label>
                <input type="number" class="form-control" name="piezas" [(ngModel)]="paquete.piezas"
                    placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-3 col-lg-2">
                <label for="volumen">Volumen:</label>
                <input type="number" class="form-control" name="volumen" [(ngModel)]="paquete.volumen"
                    placeholder="Escriba aquí" />
            </div>
        </div>

        <!-- Fila 3.5: Selector de Tamaño de Paquete (Boxful) -->
        <div class="row mb-3" *ngIf="tieneBoxful">
            <div class="col-12 mb-2">
                <label class="form-label font-weight-bold">Tamaño del Paquete:</label>
            </div>
            <div class="col-md-3 mb-2">
                <div class="package-type-card p-2 d-flex align-items-center justify-content-between"
                    [class.selected]="tipoPaquete === 'S'" (click)="seleccionarTipoPaquete('S', 11, 43, 47.5)">
                    <div class="d-flex align-items-center">
                        <span class="badge-size me-2">S</span>
                        <div>
                            <div class="package-dims">S - Pequeño</div>
                            <div class="package-desc">11 x 43 x 47.5 cm</div>
                        </div>
                    </div>
                    <div class="package-box-icon d-flex align-items-center justify-content-center"
                        style="height: 45px; width: 45px;">
                        <svg width="45" height="30" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M30 5 L52 14 L30 23 L8 14 Z" fill="#FFEFEA" stroke="#FF5E36" stroke-width="1.5"
                                stroke-linejoin="round" />
                            <path d="M8 14 L8 22 L30 31 L30 23 Z" fill="#FF5E36" fill-opacity="0.1" stroke="#FF5E36"
                                stroke-width="1.5" stroke-linejoin="round" />
                            <path d="M30 23 L30 31 L52 22 L52 14 Z" fill="#FF5E36" fill-opacity="0.2" stroke="#FF5E36"
                                stroke-width="1.5" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-2">
                <div class="package-type-card p-2 d-flex align-items-center justify-content-between"
                    [class.selected]="tipoPaquete === 'M'" (click)="seleccionarTipoPaquete('M', 22, 43, 47.5)">
                    <div class="d-flex align-items-center">
                        <span class="badge-size me-2">M</span>
                        <div>
                            <div class="package-dims">M - Mediano</div>
                            <div class="package-desc">22 x 43 x 47.5 cm</div>
                        </div>
                    </div>
                    <div class="package-box-icon d-flex align-items-center justify-content-center"
                        style="height: 45px; width: 45px;">
                        <svg width="45" height="37.5" viewBox="0 0 60 50" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M30 5 L52 14 L30 23 L8 14 Z" fill="#FFEFEA" stroke="#FF5E36" stroke-width="1.5"
                                stroke-linejoin="round" />
                            <path d="M8 14 L8 30 L30 39 L30 23 Z" fill="#FF5E36" fill-opacity="0.1" stroke="#FF5E36"
                                stroke-width="1.5" stroke-linejoin="round" />
                            <path d="M30 23 L30 39 L52 30 L52 14 Z" fill="#FF5E36" fill-opacity="0.2" stroke="#FF5E36"
                                stroke-width="1.5" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-2">
                <div class="package-type-card p-2 d-flex align-items-center justify-content-between"
                    [class.selected]="tipoPaquete === 'L'" (click)="seleccionarTipoPaquete('L', 34, 43, 47.5)">
                    <div class="d-flex align-items-center">
                        <span class="badge-size me-2">L</span>
                        <div>
                            <div class="package-dims">L - Grande</div>
                            <div class="package-desc">34 x 43 x 47.5 cm</div>
                        </div>
                    </div>
                    <div class="package-box-icon d-flex align-items-center justify-content-center"
                        style="height: 45px; width: 45px;">
                        <svg width="45" height="45" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M30 5 L52 14 L30 23 L8 14 Z" fill="#FFEFEA" stroke="#FF5E36" stroke-width="1.5"
                                stroke-linejoin="round" />
                            <path d="M8 14 L8 38 L30 47 L30 23 Z" fill="#FF5E36" fill-opacity="0.1" stroke="#FF5E36"
                                stroke-width="1.5" stroke-linejoin="round" />
                            <path d="M30 23 L30 47 L52 38 L52 14 Z" fill="#FF5E36" fill-opacity="0.2" stroke="#FF5E36"
                                stroke-width="1.5" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Fila 3b: Propiedades adicionales de Boxful -->
        <div class="row mb-3" *ngIf="tieneBoxful">
            <div class="form-group col-md-6 col-lg-4">
                <label for="contenido">Contenido del paquete: <span class="text-danger">*</span></label>
                <textarea class="form-control" name="contenido" [(ngModel)]="paquete.contenido" rows="2"
                    placeholder="Ej. Ropa, Documentos"></textarea>
            </div>
        </div>

        <!-- Fila 4: Tarifa y Totales -->
        <div class="row">
            <div class="form-group col-md-3 col-lg-2">
                <label for="precio">Tarifa:</label>
                <input type="number" class="form-control" name="precio" [(ngModel)]="paquete.precio"
                    placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-3 col-lg-2">
                <label for="cuenta_a_terceros">Cuenta a terceros:</label>
                <input type="number" class="form-control" name="cuenta_a_terceros"
                    [(ngModel)]="paquete.cuenta_a_terceros" placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-3 col-lg-2">
                <label for="otros">Otros:</label>
                <input type="number" class="form-control" name="otros" [(ngModel)]="paquete.otros"
                    placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-3 col-lg-2">
                <label for="total">Total:</label>
                <input type="number" class="form-control" name="total" [(ngModel)]="paquete.total"
                    placeholder="Escriba aquí" />
            </div>
        </div>
    </div>


    <div class="bg-white rounded p-3 mb-3">
        <div class="form-group col-sm-12 pt-2 pb-4">
            <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F8" tooltip="Procesar (F8)">
                <span *ngIf="!saving">Procesar paquete <img src="assets/icons/arrow-right-stroke.png"
                        class="icon2 ms-2"></span>
                <span *ngIf="saving">Procesando...</span>
            </button>
        </div>
    </div>
</form>
