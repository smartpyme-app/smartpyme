<div class="resultados-section">
    <ng-template #resultadosChartLoader>
        <div class="d-flex align-items-center justify-content-center text-primary" style="min-height: 220px;"
            aria-busy="true" aria-live="polite">
            <div class="spinner-border" role="status" style="width: 2.5rem; height: 2.5rem;">
                <span class="visually-hidden">Cargando gráfico…</span>
            </div>
        </div>
    </ng-template>
    <ng-template #resultadosMetricasLoader>
        <div class="d-flex align-items-center justify-content-center text-primary" style="min-height: 100px;"
            aria-busy="true" aria-live="polite">
            <div class="spinner-border spinner-border-sm" role="status">
                <span class="visually-hidden">Cargando métricas…</span>
            </div>
        </div>
    </ng-template>
    <ng-template #resultadosListLoader>
        <div class="d-flex align-items-center justify-content-center text-primary" style="min-height: 280px;"
            aria-busy="true" aria-live="polite">
            <div class="spinner-border" role="status" style="width: 2.5rem; height: 2.5rem;">
                <span class="visually-hidden">Cargando…</span>
            </div>
        </div>
    </ng-template>
    <ng-template #resultadosCashflowBlockLoader>
        <div class="d-flex align-items-center justify-content-center text-primary my-4" style="min-height: 480px;"
            aria-busy="true" aria-live="polite">
            <div class="spinner-border" role="status" style="width: 2.5rem; height: 2.5rem;">
                <span class="visually-hidden">Cargando flujo de efectivo…</span>
            </div>
        </div>
    </ng-template>
    <!-- Filtros específicos de Resultados -->
    <div class="bg-white p-2 rounded mb-3 filter-bar-card">
        <div class="d-flex align-items-center justify-content-end flex-wrap gap-3">

            <!-- Contenedor de filtros (año, mes y sucursal) alineados a la derecha -->
            <div class="d-flex align-items-end gap-3 flex-wrap mb-2">
                <!-- Selector de año -->
                <div class="d-flex flex-column dmf-select-outer">
                    <span class="dmf-select-label fw-medium small mb-1">Año</span>
                    <div class="dmf-select-wrap">
                        <span class="dmf-select-icon" aria-hidden="true">
                            <i class="fas fa-chevron-down"></i>
                        </span>
                        <select id="anioResultados" name="anioResultados" class="dmf-select"
                            [ngModel]="anioSeleccionado" (ngModelChange)="cambiarAnio($event)">
                            <option *ngFor="let anio of anios; trackBy: trackByIndex" [ngValue]="anio">
                                {{ anio }}
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Selector de mes -->
                <div class="d-flex flex-column dmf-select-outer">
                    <span class="dmf-select-label fw-medium small mb-1">Mes</span>
                    <div class="dmf-select-wrap">
                        <span class="dmf-select-icon" aria-hidden="true">
                            <i class="fas fa-chevron-down"></i>
                        </span>
                        <select id="mesResultados" name="mesResultados" class="dmf-select"
                            [(ngModel)]="mesFlujoEfectivo" (ngModelChange)="onMesFlujoEfectivoChange()">
                            <option [ngValue]="null">Todo el año</option>
                            <option *ngFor="let m of opcionesMesFlujo; trackBy: trackByMesValor" [ngValue]="m.valor">
                                {{ m.etiqueta }}
                            </option>
                        </select>
                    </div>
                </div>

                <app-dropdown-multi-filtro label="Sucursales" pluralLabel="sucursales" [items]="sucursales"
                    [disabled]="sucursalesMultiDisabled" [todasImplicitas]="sucursalesTodasImplicitas"
                    [seleccionados]="sucursalesSeleccionadas" (selectionChange)="onSucursalesMultiFiltroChange($event)">
                </app-dropdown-multi-filtro>
            </div>
        </div>
    </div>

    <!-- Sección de Resultados Generales en una sola tarjeta blanca (Curva de Rendimiento) -->
    <div class="card card-performance mb-2">
        <div class="card-body p-4">
            <div class="metrics-flex-row mb-4" *ngIf="datos?.metrics; else resultadosMetricasLoader">
                <div class="metric-flex-col" *ngFor="let metric of datos.metrics; trackBy: trackByIndex">
                    <app-chart-card [data]="metric"></app-chart-card>
                </div>
            </div>

            <!-- Gráfico de Ventas y Gastos por Mes -->
            <div class="row">
                <div class="col-12 mb-4">
                    <app-bar-chart *ngIf="datos.ventasGastosConfig; else resultadosChartLoader"
                        [config]="datos.ventasGastosConfig">
                    </app-bar-chart>
                </div>
            </div>

            <div class="row">
                <ng-container
                    *ngIf="datos.cuentasPorCobrar !== undefined && datos.cuentasPorPagar !== undefined; else resultadosListLoader">
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <app-accounts-list title="Cuentas por cobrar clientes"
                                    [accounts]="datos.cuentasPorCobrar || []" type="receivable">
                                </app-accounts-list>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <app-accounts-list title="Cuentas por pagar proveedores"
                                    [accounts]="datos.cuentasPorPagar || []" type="payable">
                                </app-accounts-list>
                            </div>
                        </div>
                    </div>
                </ng-container>
            </div>
        </div>
    </div>

    <!-- Sección Flujo de Efectivo en una sola tarjeta blanca (card-performance) -->
    <div class="card card-performance my-2">
        <div class="card-body p-4">
            <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
                <div class="text-white fw-bold text-center py-2 px-5"
                    style="background-color: #2D52A8; font-size: 1.35rem; box-shadow: 0 5px 15px rgba(46, 92, 197, 0.25); border-radius: 0px; display: inline-block; min-width: 300px; max-width: 100%;">
                    Flujo de efectivo
                </div>
                <div class="d-flex align-items-end gap-3 flex-wrap">
                    <!-- Selector de año -->
                    <div class="d-flex flex-column dmf-select-outer">
                        <span class="dmf-select-label fw-medium small mb-1">Año</span>
                        <div class="dmf-select-wrap">
                            <span class="dmf-select-icon" aria-hidden="true">
                                <i class="fas fa-chevron-down"></i>
                            </span>
                            <select id="anioResultadosFlujo" name="anioResultadosFlujo" class="dmf-select"
                                [ngModel]="anioSeleccionado" (ngModelChange)="cambiarAnio($event)">
                                <option *ngFor="let anio of anios; trackBy: trackByIndex" [ngValue]="anio">
                                    {{ anio }}
                                </option>
                            </select>
                        </div>
                    </div>

                    <!-- Selector de mes -->
                    <div class="d-flex flex-column dmf-select-outer" style="min-width: 160px;">
                        <span class="dmf-select-label fw-medium small mb-1">Mes</span>
                        <div class="dmf-select-wrap">
                            <span class="dmf-select-icon" aria-hidden="true">
                                <i class="fas fa-chevron-down"></i>
                            </span>
                            <select id="mesFiltro" name="mesFlujoEfectivo" class="dmf-select"
                                [(ngModel)]="mesFlujoEfectivo" (ngModelChange)="onMesFlujoEfectivoChange()">
                                <option [ngValue]="null">Todo el año</option>
                                <option *ngFor="let m of opcionesMesFlujo; trackBy: trackByMesValor"
                                    [ngValue]="m.valor">
                                    {{ m.etiqueta }}
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Resumen + tablas Flujo de Efectivo (bloque pesado) -->
            <ng-container *ngIf="datos.cashflow !== undefined; else resultadosCashflowBlockLoader">
                <div class="metrics-flex-row mb-4" *ngIf="datos.cashflow as cf">
                    <div class="metric-flex-col">
                        <app-chart-card
                            [data]="{ title: 'Ingresos percibidos', value: cf.ingresosTotales || 0, type: 'currency' }"></app-chart-card>
                    </div>
                    <div class="metric-flex-col">
                        <app-chart-card
                            [data]="{ title: 'Egresos realizados', value: cf.egresosTotales || 0, type: 'currency' }"></app-chart-card>
                    </div>
                    <div class="metric-flex-col">
                        <app-chart-card
                            [data]="{ title: 'Resultados (neto)', value: (cf.ingresosTotales || 0) - (cf.egresosTotales || 0), type: 'currency' }"></app-chart-card>
                    </div>
                </div>
                <div class="row" *ngIf="datos.cashflow as cf">
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-body p-0">
                                <div
                                    class="d-flex flex-column align-items-center p-3 border-bottom gap-2">
                                    <h6 class="card-title mb-0 fw-bold text-center">Ventas del mes</h6>
                                    <div class="d-flex gap-2 align-items-center flex-wrap justify-content-center">
                                        <div class="input-group" style="width: 220px;">
                                            <span class="input-group-text bg-white border-end-0">
                                                <i class="fas fa-search text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control border-start-0"
                                                placeholder="Buscar..." [(ngModel)]="quickFilterVentas"
                                                (input)="onQuickFilterVentasChange()">
                                        </div>
                                        <!-- <button class="btn btn-sm btn-outline-primary" (click)="exportarVentasCSV()"
                                            title="Exportar a CSV">
                                            <i class="fas fa-file-csv me-1"></i> CSV
                                        </button> -->
                                        <button class="btn btn-sm btn-outline-success" (click)="exportarVentasExcel()"
                                            title="Exportar a Excel">
                                            <i class="fas fa-file-excel me-1"></i> Excel
                                        </button>
                                        <button class="btn btn-sm btn-outline-secondary"
                                            (click)="limpiarFiltrosVentas()" title="Limpiar filtros">
                                            <i class="fas fa-filter me-1"></i> Limpiar
                                        </button>
                                    </div>
                                </div>
                                <ag-grid-angular #ventasGrid class="ag-theme-alpine w-100" [rowData]="ventasRows"
                                    [columnDefs]="ventasColumnDefs" [gridOptions]="ventasGridOptions"
                                    [quickFilterText]="quickFilterVentas" [defaultColDef]="{
                                        resizable: true,
                                        sortable: true,
                                        filter: true
                                    }" style="width: 100%; height: 400px;" [domLayout]="'normal'">
                                </ag-grid-angular>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-body p-0">
                                <div
                                    class="d-flex flex-column align-items-center p-3 border-bottom gap-2">
                                    <h6 class="card-title mb-0 fw-bold text-center">Gastos del mes</h6>
                                    <div class="d-flex gap-2 align-items-center flex-wrap justify-content-center">
                                        <div class="input-group" style="width: 220px;">
                                            <span class="input-group-text bg-white border-end-0">
                                                <i class="fas fa-search text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control border-start-0"
                                                placeholder="Buscar..." [(ngModel)]="quickFilterGastos"
                                                (input)="onQuickFilterGastosChange()">
                                        </div>
                                        <!-- <button class="btn btn-sm btn-outline-primary" (click)="exportarGastosCSV()"
                                            title="Exportar a CSV">
                                            <i class="fas fa-file-csv me-1"></i> CSV
                                        </button> -->
                                        <button class="btn btn-sm btn-outline-success" (click)="exportarGastosExcel()"
                                            title="Exportar a Excel">
                                            <i class="fas fa-file-excel me-1"></i> Excel
                                        </button>
                                        <button class="btn btn-sm btn-outline-secondary"
                                            (click)="limpiarFiltrosGastos()" title="Limpiar filtros">
                                            <i class="fas fa-filter me-1"></i> Limpiar
                                        </button>
                                    </div>
                                </div>
                                <ag-grid-angular #gastosGrid class="ag-theme-alpine w-100" [rowData]="gastosRows"
                                    [columnDefs]="gastosColumnDefs" [gridOptions]="gastosGridOptions"
                                    [quickFilterText]="quickFilterGastos" [defaultColDef]="{
                                        resizable: true,
                                        sortable: true,
                                        filter: true
                                    }" style="width: 100%; height: 400px;" [domLayout]="'normal'">
                                </ag-grid-angular>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-container>

            <!-- Tablas Abonos CxC / CxP -->
            <ng-container *ngIf="datos.abonos !== undefined; else resultadosListLoader">
                <div class="row" *ngIf="datos.abonos">
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-body p-0">
                                <div
                                    class="d-flex flex-column align-items-center p-3 border-bottom gap-2">
                                    <h6 class="card-title mb-0 fw-bold text-center">Abonos recibidos CxC</h6>
                                    <div class="d-flex gap-2 align-items-center flex-wrap justify-content-center">
                                        <div class="input-group" style="width: 220px;">
                                            <span class="input-group-text bg-white border-end-0">
                                                <i class="fas fa-search text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control border-start-0"
                                                placeholder="Buscar..." [(ngModel)]="quickFilterAbonosCxc"
                                                (input)="onQuickFilterAbonosCxcChange()">
                                        </div>
                                        <button class="btn btn-sm btn-outline-success"
                                            (click)="exportarAbonosCxcExcel()" title="Exportar a Excel">
                                            <i class="fas fa-file-excel me-1"></i> Excel
                                        </button>
                                        <button class="btn btn-sm btn-outline-secondary"
                                            (click)="limpiarFiltrosAbonosCxc()" title="Limpiar filtros">
                                            <i class="fas fa-filter me-1"></i> Limpiar
                                        </button>
                                    </div>
                                </div>
                                <ag-grid-angular #abonosCxcGrid class="ag-theme-alpine w-100" [rowData]="abonosCxcRows"
                                    [columnDefs]="abonosCxcColumnDefs" [gridOptions]="abonosCxcGridOptions"
                                    [quickFilterText]="quickFilterAbonosCxc" [defaultColDef]="{
                            resizable: true,
                            sortable: true,
                            filter: true
                        }" style="width: 100%; height: 400px;" [domLayout]="'normal'">
                                </ag-grid-angular>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-body p-0">
                                <div
                                    class="d-flex flex-column align-items-center p-3 border-bottom gap-2">
                                    <h6 class="card-title mb-0 fw-bold text-center">Abonos realizados CxP</h6>
                                    <div class="d-flex gap-2 align-items-center flex-wrap justify-content-center">
                                        <div class="input-group" style="width: 220px;">
                                            <span class="input-group-text bg-white border-end-0">
                                                <i class="fas fa-search text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control border-start-0"
                                                placeholder="Buscar..." [(ngModel)]="quickFilterAbonosCxp"
                                                (input)="onQuickFilterAbonosCxpChange()">
                                        </div>
                                        <button class="btn btn-sm btn-outline-success"
                                            (click)="exportarAbonosCxpExcel()" title="Exportar a Excel">
                                            <i class="fas fa-file-excel me-1"></i> Excel
                                        </button>
                                        <button class="btn btn-sm btn-outline-secondary"
                                            (click)="limpiarFiltrosAbonosCxp()" title="Limpiar filtros">
                                            <i class="fas fa-filter me-1"></i> Limpiar
                                        </button>
                                    </div>
                                </div>
                                <ag-grid-angular #abonosCxpGrid class="ag-theme-alpine w-100" [rowData]="abonosCxpRows"
                                    [columnDefs]="abonosCxpColumnDefs" [gridOptions]="abonosCxpGridOptions"
                                    [quickFilterText]="quickFilterAbonosCxp" [defaultColDef]="{
                            resizable: true,
                            sortable: true,
                            filter: true
                        }" style="width: 100%; height: 400px;" [domLayout]="'normal'">
                                </ag-grid-angular>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>

    <!-- Sección Resultados vs presupuesto -->
    <div class="row mt-4" *ngIf="datos.budgetMetrics">
        <div class="col-12 mb-3">
            <div class="d-flex align-items-center justify-content-between">
                <button type="button" class="btn btn-section-active px-4 py-2 fw-bold" style="border-radius: 8px;">
                    Resultados vs presupuesto
                </button>
                <div class="d-flex align-items-center gap-2">
                    <label for="presupuesto" class="mb-0 fw-medium">Presupuesto:</label>
                    <select id="presupuesto" class="form-select" style="width: auto; min-width: 120px;"
                        [(ngModel)]="presupuestoSeleccionado">
                        <option *ngFor="let presupuesto of presupuestos; trackBy: trackById" [value]="presupuesto.id">
                            {{ presupuesto.nombre }}
                        </option>
                    </select>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4" *ngFor="let metric of datos.budgetMetrics; trackBy: trackByIndex">
            <app-budget-card [data]="metric"></app-budget-card>
        </div>
    </div>
</div>
