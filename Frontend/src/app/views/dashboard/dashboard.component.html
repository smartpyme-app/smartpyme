<!-- Sección de navegación -->
<div class="bg-white p-4 rounded mb-3">
    <div class="d-flex gap-2 flex-wrap">
        <button 
            *ngFor="let seccion of secciones" 
            type="button"
            class="btn rounded-pill px-4 py-2 fw-medium"
            [ngClass]="seccion.activo ? 'btn-section-active' : 'btn-section-inactive'"
            (click)="cambiarSeccion(seccion)">
            {{ seccion.nombre }}
        </button>
    </div>
</div>

<div class="dashboard-container" *ngIf="!loading">
    <!-- Selector dinámico de componentes según la sección activa -->
    <ng-container [ngSwitch]="seccionActiva">
        <app-resultados 
            *ngSwitchCase="'Resultados'"
            [datos]="datos"
            (filtrosCambiados)="onFiltrosResultadosCambiados($event)">
        </app-resultados>

        <app-ventas 
            *ngSwitchCase="'Ventas'"
            [datos]="datos"
            (filtrosCambiados)="onFiltrosVentasCambiados($event)">
        </app-ventas>

        <app-finanzas 
            *ngSwitchCase="'Finanzas'"
            [datos]="datos">
        </app-finanzas>

        <app-gastos 
            *ngSwitchCase="'Gastos'"
            [datos]="datos">
        </app-gastos>

        <app-control-cuentas 
            *ngSwitchCase="'Control de cuentas'"
            [datos]="datos">
        </app-control-cuentas>

        <app-inventario 
            *ngSwitchCase="'Inventario'"
            [datos]="datos">
        </app-inventario>
    </ng-container>
</div>

<div class="d-flex justify-content-center align-items-center p-5" *ngIf="loading">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Cargando...</span>
    </div>
</div>
