<!-- Sección de navegación -->
<div class="bg-white p-4 rounded mb-3">
    <div class="d-flex gap-2 flex-wrap">
        <button 
            *ngFor="let seccion of secciones" 
            type="button"
            class="btn rounded-pill px-4 py-2 fw-medium"
            [ngClass]="seccion.activo ? 'btn-section-active' : 'btn-section-inactive'"
            (click)="cambiarSeccion(seccion)">
            {{ seccion.nombre }}
        </button>
    </div>
</div> 

<div class="dashboard-shell position-relative">
    <div class="dashboard-container">
        <ng-container [ngSwitch]="seccionActiva">
            <app-resultados 
                *ngSwitchCase="'Resultados'"
                [datos]="datos"
                (filtrosCambiados)="onFiltrosResultadosCambiados($event)">
            </app-resultados>

            <app-ventas 
                *ngSwitchCase="'Ventas'"
                [datos]="datos"
                (filtrosCambiados)="onFiltrosVentasCambiados($event)">
            </app-ventas>

            <!-- <app-finanzas 
                *ngSwitchCase="'Finanzas'"
                [datos]="datos">
            </app-finanzas> -->

            <app-gastos 
                *ngSwitchCase="'Gastos'"
                [datos]="datos"
                (filtrosCambiados)="onFiltrosGastosCambiados($event)">
            </app-gastos>

            <app-control-cuentas 
                *ngSwitchCase="'Control de cuentas'"
                [datos]="datos"
                (filtrosCambiados)="onFiltrosControlCuentasCambiados($event)">
            </app-control-cuentas>

            <app-inventario 
                *ngSwitchCase="'Inventario'"
                [datos]="datos"
                (filtrosCambiados)="onFiltrosInventarioCambiados($event)">
            </app-inventario>
        </ng-container>
    </div>

    <div class="dashboard-loading-overlay" *ngIf="loading" aria-busy="true" aria-live="polite">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>
</div>
