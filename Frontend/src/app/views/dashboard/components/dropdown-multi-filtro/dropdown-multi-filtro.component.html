<div
    class="d-flex flex-column dropdown-multi-filtro-outer"
    [class.dropdown-multi-filtro-outer--open]="panelAbierto"
    [class.dropdown-multi-filtro-outer--accent]="!!accentColor"
    [style.--dmf-accent]="accentColor || null"
    #wrap>

    <span class="dropdown-multi-filtro-label fw-medium small mb-1">{{ label }}</span>

    <div class="dropdown-multi-filtro position-relative">

        <!-- ── Autocomplete trigger ─────────────────────────────── -->
        <div class="dropdown-multi-filtro-input-wrap"
             [class.dmf-input-wrap--disabled]="disabled || items.length === 0"
             [class.dmf-input-wrap--open]="panelAbierto">

            <!-- Icono de búsqueda / chevron -->
            <span class="dmf-input-icon" aria-hidden="true">
                <i class="fas" [ngClass]="panelAbierto ? 'fa-search' : 'fa-chevron-down'"></i>
            </span>

            <input
                #autocompleteInput
                type="text"
                class="dmf-input"
                [disabled]="disabled || items.length === 0"
                [value]="panelAbierto ? buscadorTexto : etiquetaResumen"
                [placeholder]="panelAbierto ? (buscadorPlaceholder || 'Buscar…') : etiquetaResumen"
                (focus)="onInputFocus()"
                (input)="onBusquedaInput($event)"
                (keydown)="onInputKeydown($event)"
                autocomplete="off"
                [attr.aria-expanded]="panelAbierto"
                [attr.aria-haspopup]="'listbox'"
                role="combobox">

            <!-- Botón limpiar (visible cuando hay texto de búsqueda) -->
            <button
                *ngIf="panelAbierto && buscadorTexto"
                type="button"
                class="dmf-clear-btn"
                aria-label="Limpiar búsqueda"
                (mousedown)="limpiarBuscador($event)">
                <i class="fas fa-times-circle"></i>
            </button>
        </div>

        <!-- ── Panel de opciones ────────────────────────────────── -->
        <div
            class="dropdown-multi-filtro-panel"
            *ngIf="panelAbierto && !disabled && items.length > 0"
            (click)="$event.stopPropagation()"
            role="listbox"
            aria-multiselectable="true">

            <!-- Seleccionar todo -->
            <div class="dropdown-multi-filtro-panel-scroll">
                <label class="dropdown-multi-filtro-row dmf-row-todo">
                    <input
                        type="checkbox"
                        class="form-check-input flex-shrink-0"
                        [checked]="seleccionarTodoChecked"
                        (change)="onSeleccionarTodoChange($event)">
                    <span class="fw-medium">Seleccionar todo</span>
                    <span class="badge dmf-badge ms-auto" *ngIf="hayBusquedaActiva">
                        {{ itemsFiltrados.length }}
                    </span>
                </label>

                <label
                    *ngFor="let s of itemsFiltrados; trackBy: trackById"
                    class="dropdown-multi-filtro-row">
                    <input
                        type="checkbox"
                        class="form-check-input flex-shrink-0"
                        [checked]="isItemChecked(s.id)"
                        (change)="onItemChange(s.id, $any($event.target).checked)">
                    <span class="text-truncate" [title]="s.nombre">
                        <span *ngIf="!hayBusquedaActiva">{{ s.nombre }}</span>
                        <span *ngIf="hayBusquedaActiva" [innerHTML]="resaltarCoincidencia(s.nombre, buscadorTexto)"></span>
                    </span>
                </label>

                <!-- Sin resultados -->
                <div
                    *ngIf="hayBusquedaActiva && itemsFiltrados.length === 0"
                    class="dropdown-multi-filtro-sin-resultados px-3 py-3 small text-muted text-center">
                    <i class="fas fa-search-minus mb-1 d-block opacity-50"></i>
                    Sin resultados para "<strong>{{ buscadorTexto }}</strong>"
                </div>

                <!-- Aviso de límite inicial -->
                <p
                    *ngIf="mostrarAvisoLimiteVista"
                    class="dropdown-multi-filtro-limite-aviso small text-muted mb-0 px-3 py-2">
                    {{ textoAyudaLimiteVista }}
                </p>
            </div>
        </div>

    </div>
</div>
