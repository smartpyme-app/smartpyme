<div class="card h-100 border">
    <div class="card-body p-4">
        <div class="mb-3">
            <h6 class="card-title mb-3 fw-normal text-dark">{{ data.title }}</h6>
            <div class="d-flex align-items-baseline mb-2">
                <span class="display-6 fw-bold" [ngClass]="getColorClass()">
                    {{ formatCurrency(data.currentValue) }}
                </span>
            </div>
            <div class="mb-2">
                <small [ngClass]="getColorClass()" class="fw-medium">
                    {{ formatPercentage(data.percentageChange) }}
                </small>
            </div>
            <div class="text-muted small">
                Meta para {{ data.targetMonth }}: {{ formatCurrency(data.target) }}
            </div>
        </div>
        <div class="mini-chart mt-3">
            <div echarts [options]="chartOption" class="chart-container"></div>
        </div>
    </div>
</div>
