<section class="d-flex justify-content-between bg-white p-4 rounded mb-3">
    <h2 class="page-heading">Bancos</h2>
    <!-- <button (click)="openModal(mdetalle, {})"  tooltip="Crear canal (F7)" class="btn btn-default tcla-F7"><i class="fa fa-plus"></i> Añadir canal</button> -->
</section>

<div class="card p-3">
    <table class="table table-borderless">
      <thead>
        <tr>
          <th>Nombre</th>
          <th class="ps-4">Activo</th>
        </tr>
      </thead>
      <tbody>
        <tr>
            <td colspan="10" class="text-center" *ngIf="bancos?.length < 1 && !loading">
                <span class="badge bg-primary">No hay bancos de pago</span>
            </td>
            <td colspan="10" class="text-center" *ngIf="loading">
                <span class="badge bg-primary">Cargando...</span>
            </td>
        </tr>
        <tr *ngFor="let banco of bancos">
          <td>{{ banco.nombre }}</td>
          <td>
            <div class="form-switch">
              <input class="form-check-input ms-0" type="checkbox" role="switch" (click)="onSubmit(banco.nombre)" name="activo" [(ngModel)]="banco.activo">
            </div>
          </td>
        </tr>
      </tbody>
    </table>
</div>
