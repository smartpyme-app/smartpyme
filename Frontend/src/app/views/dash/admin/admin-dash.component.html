<div class="card bg-white border-0">
    <div class="card-body">
        <div class="d-flex justify-content-between">
            <div>
                <h3 class="mb-1" (click)="onFiltrar()">Bienvenida de vuelta, {{ usuario.name }} </h3>
                <p class="text-muted">¡Aquí podrás gestionar tu empresa de mejor manera!</p>
            </div>
            <div>
                <select [(ngModel)]="filtro.id_sucursal" (change)="onFiltrar()"  class="form-select bg-default w-auto" name="filtro.id_sucursal">
                    <option value="">Sucursal</option>
                    <option *ngFor="let sucursal of sucursales" [value]="sucursal.id">
                        {{ sucursal.nombre }}
                    </option>
                </select>
            </div>
        </div>
    </div>
</div>

<div class="my-3 d-flex justify-content-around">
    <div class="col">
        <a class="btn mx-2" [ngClass]="{'btn-primary': filtro.time == 'day', 'btn-default': filtro.time != 'day' }" (click)="setTime('day')">Hoy</a>
        <a class="btn mx-2" [ngClass]="{'btn-primary': filtro.time == 'week', 'btn-default': filtro.time != 'week' }" (click)="setTime('week')">Semana</a>
        <a class="btn mx-2" [ngClass]="{'btn-primary': filtro.time == 'month', 'btn-default': filtro.time != 'month' }" (click)="setTime('month')">Mes</a>
        <a class="btn mx-2" [ngClass]="{'btn-primary': filtro.time == 'year', 'btn-default': filtro.time != 'year' }" (click)="setTime('year')">Año</a>
    </div>
    <div class="col d-none d-md-flex justify-content-end">
        <button class="btn btn-default"><img src="/assets/icons/filter.png" class="icon"></button>
    </div>    
</div>

<div class="row">
    <div class="col-lg-12">
        <app-datos [loading]="loading" [dash]="dash"></app-datos>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <app-tops [loading]="loading" [dash]="dash"></app-tops>
    </div>
</div>
