<div class="card bg-white border-0">
    <div class="card-body">
        <div class="row align-items-center">
            <div class="col-lg-9">
                <h3 class="mb-1" (click)="loadAll()">{{ saludo }} {{ usuario.name }} </h3>
                <p class="text-muted">¡Aquí podrás gestionar tu empresa de mejor manera!</p>
            </div>
            <div class="col-lg-3">
                <select [(ngModel)]="filtro.sucursal_id" (change)="loadAll()"  class="form-select bg-default" name="filtro.sucursal_id">
                    <option value="">Todas las sucursales</option>
                    <option *ngFor="let sucursal of sucursales" [ngValue]="sucursal.id">
                        {{ sucursal.nombre }}
                    </option>
                </select>
            </div>
        </div>
    </div>
</div>

<div class="my-3 d-flex justify-content-around">
    <div class="col">
        <button class="btn btn-primary">Hoy</button>
        <button class="btn btn-default mx-2">Semana</button>
        <button class="btn btn-default">Mes</button>
        <button class="btn btn-default ms-2">Año</button>
    </div>
    <div class="col d-none d-md-flex justify-content-end">
        <button class="btn btn-default"><i class="fa fa-filter"></i></button>
    </div>    
</div>

<div class="row">
    <div class="col-lg-12">
        <app-datos [loading]="loading" [dash]="dash"></app-datos>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <app-tops [loading]="loading" [dash]="dash"></app-tops>
    </div>
</div>
