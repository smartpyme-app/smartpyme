<app-vendedor-dash *ngIf="usuario.tipo == 'Vendedor'"></app-vendedor-dash>

@if (apiService.isAdminRole() && !usuario.empresa.licencia) {
    <app-admin-dash></app-admin-dash>
}
@if (apiService.validateRole('usuario_ventas', true)) {
    <app-caja-dash></app-caja-dash>
}
@if (apiService.validateRole('usuario_vendedor', true)) {
    <app-vendedor-dash></app-vendedor-dash>
}

@if (apiService.isNotSuperAdmin() && usuario.empresa.licencia) {
    <app-organizaciones-dash></app-organizaciones-dash>
}
