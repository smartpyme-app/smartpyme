<app-admin-dash *ngIf="apiService.isAdmin()"></app-admin-dash>
<app-caja-dash *ngIf="usuario.tipo == 'Ventas'"></app-caja-dash>
<app-vendedor-dash *ngIf="usuario.tipo == 'Vendedor'"></app-vendedor-dash>

<tour-step-template></tour-step-template>
<ng-template #mtour>
    <div class="modal-header d-block text-center">
        <h3 class="modal-title mb-0">Bienvenido a SmartPyme</h3>
    </div>
    <div class="modal-body">
        <div class="row text-center my-3">
            <p class="fs-5">A continuación <b>{{ usuario.name }}</b>, te guiaremos para que puedas comenzar a gestionar <b>{{ usuario.empresa.nombre }}</b> con nosotros. </p>
        </div>
    </div>
    <div class="modal-footer d-flex justify-content-around">
        <button (click)="omitirTour()" class="col-4 btn btn-link"> Omitir </button>
        <button (click)="starTour()" class="col-6 btn btn-primary"> Iniciar tour </button>
    </div>
</ng-template>

<ng-template #mtourend>
    <div class="modal-header d-block text-center">
        <h3 class="modal-title mb-0">Gracias por usar SmartPyme</h3>
    </div>
    <div class="modal-body">
        <div class="row text-center my-3">
            <p class="fs-5">Ahora <b>{{ usuario.name }}</b> ya puedes empezar a utilizar SmartPyme.
            </p>
        </div>
    </div>
    <div class="modal-footer d-flex justify-content-around">
        <!-- <button (click)="omitirTour()" class="col-4 btn btn-link"> Omitir </button> -->
        <button (click)="modalRefEndTour.hide();" class="col-6 btn btn-primary"> Finalizar tour </button>
    </div>
</ng-template>
