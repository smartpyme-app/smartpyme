<app-buscar-producto [producto]="producto" (productoSelect)="productoSelect($event)"></app-buscar-producto>

<div class="row">
  <div class="col-md-12 table-responsive">
    <table class="table table-sm table-borderless table-hover table-condensed mb-0 align-middle">
      <thead>
        <tr>
          <th>Producto</th>
          <th style="width: 150px;">Cantidad</th>
          <th style="width: 150px;">Costo</th>
          <th style="width: 150px;">En combo</th>
          <th style="width: 100px;" class="text-right">Total</th>
          <th style="width: 50px;" class="text-center"><i class="fa fa-cog"></i></th>
        </tr>
      </thead>
      <tbody>
        @if (producto?.detalles?.length < 1) {
            <tr>
                <td colspan="7" class="text-center">
                    <p class="text-muted my-3">
                        Agregue productos y servicios
                    </p>
                </td>
            </tr>
        }
        @for (detalle of producto?.detalles; track detalle.id_producto || $index) {
            <tr>
                <td>
                    <img [appLazyImage]="apiService.baseUrl + '/img/' + detalle.img" class="rounded-circle" height="50px" width="50px">
                    {{ detalle.nombre_producto }}
                </td>
                <td style="width: 150px;">
                    <input type="number" [(ngModel)]="detalle.cantidad" (change)="updateTotal(detalle)"
                        (keyup)="updateTotal(detalle)" class="form-control">
                </td>
                <td style="width: 150px;">
                    <input type="number" [(ngModel)]="detalle.costo" (change)="updateTotal(detalle)"
                        (keyup)="updateTotal(detalle)" class="form-control" name="costo">
                </td>
                <td style="width: 150px;">
                    <input type="number" [(ngModel)]="detalle.cantidad_combo" class="form-control" name="cantidad_combo"
                        disabled>
                </td>
                <td style="width: 100px;" class="text-right">{{ detalle.total | currency}}
                </td>
                <td style="width: 50px;" class="text-center">
                    <div class="btn-group">
                        <span class="btn btn-link" (click)="delete(detalle)">
                            <i class="fa fa-trash"></i>
                        </span>
                    </div>
                </td>
            </tr>
        }
      </tbody>
    </table>
  </div>
</div>


<ng-template #msupervisor>
  <div class="modal-header">
    <h4 class="modal-title text-center">Autorización</h4>
  </div>
  <div class="modal-body">
    <div class="row text-center">
      <form name="form" (ngSubmit)="supervisorCheck()">
        <div class="form-group col-md-12">
          <label for="codigo">Ingrese el código de supervisor:</label>
          <input type="password" [(ngModel)]="supervisor.codigo" name="codigo" class="form-control text-center"
            focus="true">
        </div>
        <div class="d-grid mt-4">
          <button [disabled]="loading || !supervisor.codigo" class="btn btn-primary btn-block">
            @if (!loading) {
                <span>Autorizar</span>
            }
            @if (loading) {
                <span>Autorizando...</span>
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</ng-template>
