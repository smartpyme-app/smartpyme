<div class="d-flex justify-content-between bg-white rounded p-3 mb-3">
    <h3 (click)="loadAll()">{{ producto.id ? 'Editar ' : 'Crear ' }} {{ producto.tipo == 'Servicio' ? 'Servicio' : 'Producto' }}</h3>
    <button class="btn btn-light text-danger" *ngIf="producto.tipo == 'Producto' || producto.tipo == 'Compuesto'" routerLink="/productos"><i class="fa fa-arrow-left"></i> Regresar</button>
    <button class="btn btn-light text-danger" *ngIf="producto.tipo == 'Servicio'" routerLink="/servicios"><i class="fa fa-arrow-left"></i> Regresar</button>
    <button class="btn btn-light text-danger" *ngIf="producto.tipo == 'Materias'" routerLink="/materias-primas"><i class="fa fa-arrow-left"></i> Regresar</button>
</div>

<div class="bg-white rounded p-3 mb-3">
    <div class="row mb-3">
        <div class="col-md-12">
            <app-producto-informacion [producto]='producto'></app-producto-informacion>
        </div>
    </div>
</div>
<div class="bg-white rounded p-3 mb-3" *ngIf="producto.id && producto.tipo =='Compuesto'">
    <div class="col-lg-12">
        <app-producto-composicion [producto]='producto'></app-producto-composicion>
    </div>
</div>
<div class="bg-white rounded p-3 mb-3" *ngIf="producto.id && producto.tipo !='Servicio'">
    <div class="col-lg-12">
        <app-producto-inventarios [producto]='producto'></app-producto-inventarios>
    </div>
</div>
<div class="bg-white rounded p-3 mb-3" *ngIf="producto.id">
    <div class="col-lg-12">
        <app-producto-precios [producto]='producto'></app-producto-precios>
    </div>
</div>
<div class="bg-white rounded p-3 mb-3" *ngIf="producto.id && producto.tipo !='Servicio'">
    <div class="col-lg-12">
        <app-producto-proveedores [producto]='producto'></app-producto-proveedores>
    </div>
</div>
<div class="bg-white rounded p-3 mb-3" *ngIf="producto.id">
    <div class="col-md-12">
        <app-producto-imagenes [producto]='producto'></app-producto-imagenes>
    </div>
</div>
