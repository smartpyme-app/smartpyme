<div class="row">
    <h6 class="my-3 font-weight-bold">
        Composiciones

        <a class="btn btn-default float-end" (click)="openModal(mComposicion, {})" tooltip="Agregar producto">
            <i class="fa fa-plus"></i> Agregar producto
        </a>
    </h6>

    <div class="table-responsive">
        <table class="table table-borderless table-hover">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Categoria</th>
                    <th class="text-center">Cantidad</th>
                    <th width="100" class="text-center"><i class="fa fa-cog"></i> </th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="8" class="text-center" *ngIf="loading">
                        <span class="badge mb-2 mb-xl-0 badge-primary">Cargando...</span>
                    </td>
                </tr>
                <tr>
                    <td colspan="5" class="text-center" *ngIf="!loading && producto?.composiciones.length == 0">
                        <span class="text-muted">No tiene productos agregados</span>
                    </td>
                </tr>  

                <tr *ngFor=" let composicion of producto?.composiciones">
                    <td>{{ composicion.nombre_compuesto }}</td>
                    <td>{{ composicion.nombre_categoria }}</td>
                    <td class="text-center">{{ composicion.cantidad | number:'1.1' }}</td>
                    <td class="text-center">
                        <div class="d-flex gap-2 justify-content-center">
                            <a (click)="delete(composicion)" class="btn btn-light"><i class="fa fa-trash"></i></a>
                            <a (click)="openModal(mComposicion, composicion)" class="btn btn-light"><i class="fa fa-pencil-alt"></i></a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>        

<ng-template #mComposicion>
    <div class="modal-header">
        <h3 class="modal-title text-center">Agregar producto</h3>
        <button class="btn btn-light text-danger" (click)="modalRef.hide()">Cancelar <i class="fa fa-close"></i></button>
    </div>
    <div class="modal-body">
        <app-notificaciones-container></app-notificaciones-container>
        <form autocomplete="off" (ngSubmit)="onSubmit()">
        <div class="row">
            <div class="form-group col-md-12">
                <label for="">Producto</label>
                <ng-select name="id_compuesto" [(ngModel)]="composicion.id_compuesto" class="form-select p-0">
                    <ng-option value="">Seleccionar producto</ng-option>
                    <ng-option *ngFor="let producto of productos" [value]="producto.id">
                        {{producto.nombre}}
                    </ng-option>
                </ng-select>
            </div>
            <div class="form-group col-md-12">
                <label for="cantidad">Cantidad:</label>
                <input id="cantidad" type="number" class="form-control" [(ngModel)]="composicion.cantidad" name="cantidad" placeholder="Cantidad">
            </div>
        </div>
        <br><br>
        <div class="d-grid">
            <button type="submit" [disabled]="saving || !composicion.id_compuesto" class="btn btn-primary btn-block">
                <span *ngIf="!saving">Agregar</span>
                <span *ngIf="saving">Agregando...</span>
            </button>
        </div>
        </form>
  </div>
</ng-template>
