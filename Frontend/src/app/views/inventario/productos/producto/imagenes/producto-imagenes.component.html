<h6 class="my-3 font-weight-bold">Imagenes</h6>
<div class="d-flex gap-2 flex-wrap">
    <figure *ngFor="let imagen of producto.imagenes; let i = index" class="position-relative img-fluid img-thumbnail" style="width: 200px; height: 200px; background-size: cover; background-position: center; background-image: url({{ apiService.baseUrl + '/img/' + imagen.img }});">
        <a class="position-absolute fixed-bottom btn btn-sm btn-danger text-white" (click)="delete(imagen)" tooltip="Eliminar">
            <i class="fa fa-trash"></i>
        </a>
    </figure>
  
    <figure class="img-thumbnail file-upload d-flex justify-content-center align-items-center" tooltip="Agregar" style="width: 200px; height: 200px;">
      <i class="fa fa-image fa-2x text-muted"></i>
      <input type="file" name="img" (change)="setFile($event)" accept="image/png, image/jpeg, image/jpg">
    </figure>
  

</div>
