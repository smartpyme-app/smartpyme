<div class="row">
    <a (click)="openModal(mcuenta, {})" class="btn btn-default float-end" tooltip="Agregar cuenta">
        <i class="fa fa-fw fa-plus"></i>
    </a>
    <div class="col-12 table-responsive">
        <table class="table table-borderless table-hover align-middle">
            <thead>
                <tr>
                    <th>Categoria</th>
                    <th class="d-none d-md-table-cell">Descripción</th>
                    <th class="d-none d-lg-table-cell">Estado</th>
                    <th class="text-center">Más</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="8" class="text-center" *ngIf="categoria?.cuentas?.length < 1 && !loading">
                        <span class="badge bg-primary">No tiene cuentas registrados</span>
                    </td>
                    <td colspan="8" class="text-center" *ngIf="loading">
                        <span class="badge bg-primary">Cargando...</span>
                    </td>
                </tr>
                <tr *ngFor=" let cuenta of categoria?.cuentas">
                    <td>{{ cuenta.sucursal?.nombre }}</td>
                    <td>{{ cuenta.cuenta?.nombre }}</td>
                    <td class="text-center">
                        <a (click)="openModal(mcuenta, cuenta)" class="btn btn-default" tooltip="Editar cuenta">
                            <i class="fa fa-fw fa-pencil-alt"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<ng-template #mcuenta>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center no-margin">Cuenta</h2>
    </div>
    <button type="button" class="btn-close" (click)="modalRef.hide(); alertService.modal = false;" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form autocomplete="off" (ngSubmit)="onSubmit()">
        <app-notificaciones-container></app-notificaciones-container>
        <div class="row mb-3">
            <div class="form-group col-12">
              <label for="cuenta.id_sucursal">Sucursal:</label>
              <select name="id_sucursal" [(ngModel)]="cuenta.id_sucursal" class="form-select">
                <option value="">Seleccione aquí</option>
                <option *ngFor="let sucursal of sucursales" [value]="sucursal.id">
                  {{sucursal.nombre}}
                </option>
              </select>
            </div>
            <div class="form-group col-md-12">
                <label for="cuenta.id_cuenta_contable">Cuenta de inventario:</label>
                <ng-select [(ngModel)]="cuenta.id_cuenta_contable" class="form-select p-0" name="cuenta.id_cuenta_contable">
                    <ng-option value="">Seleccione aquí</ng-option>
                    <ng-option *ngFor="let cuenta of catalogo" [value]="cuenta.id">
                        <div class="d-flex align-items-center">
                            <span style="width: 75px;">{{ cuenta.codigo }} </span>
                            <span class="col-8"> - {{ cuenta.nombre }}</span>
                        </div>
                    </ng-option>
                </ng-select>
            </div>
            <div class="form-group col-md-12">
                <label for="cuenta.id_cuenta_contable_costo">Cuenta de costo:</label>
                <ng-select [(ngModel)]="cuenta.id_cuenta_contable_costo" class="form-select p-0" name="cuenta.id_cuenta_contable_costo">
                    <ng-option value="">Seleccione aquí</ng-option>
                    <ng-option *ngFor="let cuenta of catalogo" [value]="cuenta.id">
                        <div class="d-flex align-items-center">
                            <span style="width: 75px;">{{ cuenta.codigo }} </span>
                            <span class="col-8"> - {{ cuenta.nombre }}</span>
                        </div>
                    </ng-option>
                </ng-select>
            </div>

        </div>
        <div class="d-grid">
            <button type="submit" [disabled]="loading" class="btn btn-primary btn-block">
                <span *ngIf="!loading">Guardar</span>
                <span *ngIf="loading">Guardando...</span>
            </button>
        </div>
    </form>
  </div>
</ng-template>
