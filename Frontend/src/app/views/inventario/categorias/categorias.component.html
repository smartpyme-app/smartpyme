<section class="d-flex justify-content-between bg-white p-4 rounded mb-3">
    <h2 class="page-heading">Categorias</h2>
    <button (click)="openModal(mcategoria, {})" tooltip="Crear categoria (F7)" class="btn btn-default tcla-F7"><i class="fa fa-plus"></i> Añadir categoria</button>
</section>

<section class="bg-white p-4 rounded mb-3">
    <div class="row mb-3">
        <div class="col">
            <span class="text-muted" *ngIf="categorias?.length">
                Mostrando {{ categorias?.length + ' registros' }}
            </span>
        </div>

        <div class="col">
            <div class="d-flex gap-2">
                <input type="search" placeholder="Buscar..." class="form-control" [(ngModel)]="buscador">
            </div>
        </div>
    </div>
    <div class="d-flex mb-3">
        <div class="col d-flex gap-2">
            <button class="btn btn-primary" (click)="loadAll()">Todos</button>
        </div>
        <div class="col d-flex gap-2 justify-content-end">
            <select name="filtro.estado" [(ngModel)]="filtro.estado" class="form-select bg-default w-auto" (change)="onFiltrar()">
                <option value="">Estado</option>
                <option value="true">Activo</option>
                <option value="false">Inactivo</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-12 table-responsive">
            <table class="table table-borderless table-hover align-middle">
                <thead>
                    <tr>
                        <th>Categoria</th>
                        <th class="d-none d-lg-table-cell">Estado</th>
                        <th class="d-none d-md-table-cell">Descripción</th>
                        <th class="text-center">Más</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="8" class="text-center" *ngIf="categorias?.length < 1 && !loading">
                            <span class="badge bg-primary">No tiene categorias registrados</span>
                        </td>
                        <td colspan="8" class="text-center" *ngIf="loading">
                            <span class="badge bg-primary">Cargando...</span>
                        </td>
                    </tr>
                    <tr *ngFor=" let categoria of categorias | filter:['nombre','descripcion']:buscador">
                        <td>{{ categoria.nombre }}</td>
                        <td class="d-none d-lg-table-cell">
                            <select name="enable" class="form-select w-auto border-0" (change)="setEstado(categoria)" [(ngModel)]="categoria.enable" [ngClass]="{'bg-light-danger' : categoria?.enable == false, 'bg-light-success' : categoria?.enable == true}">
                                <option value="true">Activo</option>
                                <option value="false">Inactivo</option>
                            </select>
                        </td>
                        <td class="d-none d-md-table-cell">{{ categoria.descripcion }}</td>
                        <td class="text-center">
                            <a (click)="openModal(mcategoria, categoria)" class="btn btn-light" tooltip="Editar categoria">
                                <i class="fa fa-fw fa-edit"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<ng-template #mcategoria>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center no-margin">Categoria</h2>
    </div>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form autocomplete="off" (ngSubmit)="onSubmit()">
        <div class="row">
            <div class="form-group col-12">
                <label for="categoria.nombre">Nombre</label>
                <input type="text" class="form-control" [(ngModel)]="categoria.nombre" name="categoria.nombre" focus="true">
            </div>
            <div class="form-group col-12">
                <label for="categoria.enable">Activo</label>
                <input type="checkbox" class="form-check" [(ngModel)]="categoria.enable" name="categoria.enable">
            </div>
            <div class="form-group col-12">
                <label for="categoria.descripcion">Descripción</label>
                <textarea name="categoria.descripcion" class="form-control" cols="30" rows="3" [(ngModel)]="categoria.descripcion"></textarea>
            </div>
        </div>
        <div class="d-grid">
            <button type="submit" [disabled]="loading" class="btn btn-primary btn-block">
                <span *ngIf="!loading">Añadir</span>
                <span *ngIf="loading">Añadiendo...</span>
            </button>
        </div>
    </form>
  </div>
</ng-template>

<ng-template #mcomision>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center no-margin">Comisión</h2>
    </div>
    <button type="button" class="close pull-right" aria-label="Close" (click)="modalRef.hide()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <form autocomplete="off" (ngSubmit)="onSubmit()">
        <div class="row">
            <p>Comisión de venta para los categorias de la categoria {{ categoria.nombre }}</p>
            <div class="form-group col-12">
                <label>Tipo de comisión </label>
                <select class="form-select" (change)="setTipoComision()" [(ngModel)]="categoria.tipo_comision" name="tipo_comision">
                    <option value="Ninguna">Ninguna</option>
                    <option value="Porcentaje">Porcentaje</option>
                    <option value="Monto Fijo">Monto Fijo</option>
                </select>
            </div>
            <div class="form-group col-12">
                <label>Comisión </label>
                <div class="input-group">
                    <span *ngIf="categoria.tipo_comision == 'Monto Fijo'" class="input-group-text">$</span>
                    <input type="number" class="form-control" [(ngModel)]="categoria.comision" name="comision">
                    <span *ngIf="categoria.tipo_comision == 'Porcentaje'" class="input-group-text">%</span>
                </div>
            </div>
        </div>
        <div class="row text-center mt-4">
            <div class="col-md-12">
                <button type="submit" [disabled]="loading" class="btn btn-primary btn-block">
                    <span *ngIf="!loading">Guardar</span>
                    <span *ngIf="loading">Guardando...</span>
                </button>
            </div>
        </div>
    </form>
  </div>
</ng-template>
