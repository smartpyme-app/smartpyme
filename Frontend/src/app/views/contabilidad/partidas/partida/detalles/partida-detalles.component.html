<ng-template #mcuenta>
  <div class="modal-header">
    <h4 class="modal-title text-center">Cuenta</h4>
  </div>
  <div class="modal-body">
    <form name="form" (ngSubmit)="onsubmit()">
        <div class="row">

            <div class="form-group col-md-12">
                <label for="detalle.id_cuenta">Cuenta del catálogo:</label>
                <ng-select [(ngModel)]="detalle.cuenta" (change)="selectCuenta()" class="form-select p-0" name="detalle.cuenta">
                    <ng-option value="">Seleccione aquí</ng-option>
                    <div *ngFor="let cuenta of catalogo">
                        <ng-option  [value]="cuenta" *ngIf="cuenta.acepta_datos == 1">
                        <div class="d-flex align-items-center" >
                            <span style="width: 75px;">{{ cuenta.codigo }} </span>
                            <span class="col-8"> - {{ cuenta.nombre }}</span>
                        </div>
                        </ng-option>
                    </div>  
                </ng-select>
            </div>

            <div class="form-group col-md-12 col-lg-12">
                <label for="detalle.concepto">Concepto:</label>
                <input type="text" class="form-control" name="concepto" [(ngModel)]="detalle.concepto">
            </div>

            <div class="form-group col-md-12 col-lg-6">
                <label for="detalle.debe">Debe:</label>
                <input type="text" class="form-control" name="debe" [(ngModel)]="detalle.debe">
            </div>

            <div class="form-group col-md-12 col-lg-6">
                <label for="detalle.haber">Haber:</label>
                <input type="text" class="form-control" name="haber" [(ngModel)]="detalle.haber">
            </div>

            <div class="d-grid mt-4">
                <button [disabled]="loading" class="btn btn-primary btn-block">
                    <span *ngIf="!loading">Agregar</span>
                    <span *ngIf="loading">Agregando...</span>
                </button>
            </div>
        </div>
    </form>
  </div>
</ng-template>
