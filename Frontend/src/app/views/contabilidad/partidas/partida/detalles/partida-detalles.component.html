<div class="d-flex justify-content-end mb-3">
    <button type="button" (click)="openModal(mcuenta, {})" class="btn btn-default tcla-F6" title="Agregar cuenta" [disabled]="partida.estado === 'Cerrada'">
        <img src="/assets/icons/list.png" class="icon">
    </button>
</div>

<div class="row">
    <div class="col-md-12">
        <table class="table table-sm table-borderless table-hover table-condensed mb-0 align-middle">
            <thead>
                <tr>
                    <th width="300px">Cuenta</th>
                    <th>Concepto</th>
                    <th width="130px" class="text-end" style="padding-right: 30px;">Debe</th>
                    <th width="130px" class="text-end" style="padding-right: 30px;">Haber</th>
                    <th style="width: 50px;" class="text-center"><i class="fa fa-cog"></i></th>
                </tr>
            </thead>
            <tbody class="align-top">
                <!-- if no h ay ningun producto -->
                <tr *ngIf="partida?.detalles?.length < 1">
                    <td colspan="5" class="text-center">
                        <p *ngIf="!loading" class="text-muted my-3"> Agregue partidas </p>
                        <p *ngIf="loading" class="text-muted my-3"> Cargando... </p>
                    </td>
                </tr>

                <tr *ngFor="let detalle of partida?.detalles; let i = index">
                    <!-- detalle de vendedor  -->
                    <td>
                        <ng-select [(ngModel)]="detalle.id_cuenta" (change)="selectCuenta(); marcarComoModificado(detalle)" class="form-select p-0" name="detalle.id_cuenta" [disabled]="partida.estado === 'Cerrada'">
                            <ng-option value="">Seleccione aquí</ng-option>
                            <ng-option *ngFor="let cuenta of catalogo" [value]="cuenta.id">
                                <div class="d-flex align-items-center">
                                    <span style="width: 75px;">{{ cuenta.codigo }} </span>
                                    <span class="col-8"> - {{ cuenta.nombre }}</span>
                                </div>
                            </ng-option>
                        </ng-select>
                    </td>
                    <td>
                        <input type="text" [(ngModel)]="detalle.concepto" (change)="marcarComoModificado(detalle)" (keyup)="marcarComoModificado(detalle)" class="form-control" name="concepto" [disabled]="partida.estado === 'Cerrada'">
                    </td>
                    <td>
                        <input type="number" [(ngModel)]="detalle.debe" (change)="updateTotal(detalle)" (keyup)="updateTotal(detalle)" class="form-control text-end" name="debe" [disabled]="partida.estado === 'Cerrada'">
                    </td>
                    <td>
                        <input type="number" [(ngModel)]="detalle.haber" (change)="updateTotal(detalle)" (keyup)="updateTotal(detalle)" class="form-control text-end" name="haber" [disabled]="partida.estado === 'Cerrada'">
                    </td>
                    <td>
                      <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-light" (click)="delete(detalle)" [disabled]="partida.estado === 'Cerrada'">
                          <img src="/assets/icons/trash.png" class="icon">
                        </button>
                      </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>


<ng-template #mcuenta>
  <div class="modal-header">
    <h4 class="modal-title text-center">Cuenta</h4>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form name="form" (ngSubmit)="onsubmit()">
        <div class="row">

            <div class="form-group col-md-12">
                <label for="detalle.id_cuenta">Cuenta del catálogo:</label>
                <ng-select [(ngModel)]="detalle.id_cuenta" (change)="selectCuenta()" class="form-select p-0" name="detalle.id_cuenta" [disabled]="partida.estado === 'Cerrada'">
                    <ng-option value="">Seleccione aquí</ng-option>
                    <ng-option *ngFor="let cuenta of catalogo" [value]="cuenta.id">
                        <div class="d-flex align-items-center">
                            <span class="col-4">{{ cuenta.codigo }} </span>
                            <span class="col-8"> - {{ cuenta.nombre }}</span>
                        </div>
                    </ng-option>
                </ng-select>
            </div>

            <div class="form-group col-md-12 col-lg-12">
                <label for="detalle.concepto">Concepto:</label>
                <input type="text" class="form-control" name="concepto" [(ngModel)]="detalle.concepto" [disabled]="partida.estado === 'Cerrada'">
            </div>

            <div class="form-group col-md-12 col-lg-6">
                <label for="detalle.debe">Debe:</label>
                <input type="text" class="form-control" name="debe" [(ngModel)]="detalle.debe" [disabled]="partida.estado === 'Cerrada'">
            </div>

            <div class="form-group col-md-12 col-lg-6">
                <label for="detalle.haber">Haber:</label>
                <input type="text" class="form-control" name="haber" [(ngModel)]="detalle.haber" [disabled]="partida.estado === 'Cerrada'">
            </div>

            <div class="d-grid mt-4">
                <button [disabled]="loading || partida.estado === 'Cerrada'" class="btn btn-primary btn-block">
                    <span *ngIf="!loading">Agregar</span>
                    <span *ngIf="loading">Agregando...</span>
                </button>
            </div>
        </div>
    </form>
  </div>
</ng-template>
