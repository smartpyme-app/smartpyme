                </tr>
            </thead>

                <tr *ngFor="let detalle of partida.detalles; let i = index">
                    <!-- cuenta -->
                    <td>
                      <ng-select 
                        [(ngModel)]="detalle.cuenta"
                        (change)="selectCuenta()"
                        class="form-select p-0"
                        name="detalle.cuenta-{{i}}" 
                        placeholder="Selecciona la cuenta">
                        <ng-option value="">Seleccione aquí</ng-option>
                        <div *ngFor="let cuenta of catalogo">
                          <ng-option [value]="cuenta" *ngIf="cuenta.acepta_datos === 1">
                            <div class="d-flex align-items-center">
                              <span style="width: 75px;">{{ cuenta.codigo }} </span>
                              <span class="col-8"> - {{ cuenta.nombre }}</span>
                            </div>
                          </ng-option>
                        </div>
                      </ng-select>
                    </td>
            
                    <!-- concepto -->
                    <td>
                      <input 
                        type="text" 
                        [(ngModel)]="detalle.concepto"
                        class="form-control" 
                        name="concepto-{{i}}" 
                        placeholder="Concepto">
                    </td>
            
                    <!-- debe -->
                    <td>
                      <input 
                        type="number" 
                        [(ngModel)]="detalle.debe"
                        (change)="updateTotal(detalle)" 
                        (keyup)="updateTotal(detalle)" 
                        class="form-control text-end" 
                        name="debe-{{i}}" 
                        placeholder="$00.00">
                    </td>
            
                    <!-- haber -->
                    <td>
                      <input 
                        type="number" 
                        [(ngModel)]="detalle.haber"
                        (change)="updateTotal(detalle)" 
                        (keyup)="updateTotal(detalle)" 
                        class="form-control text-end" 
                        name="haber-{{i}}" 
                        placeholder="$00.00">
                    </td>
            
                    <!-- borrar -->
                    <td>
                      <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-light" (click)="removeDetalle(i)">
                          <img src="/assets/icons/trash-2.png" class="icon">
                        </button>
                      </div>
                    </td>
                  </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>                    
                        <div >
                            <a (click)="addNewRow()" class="btn btn-outline-primary border-0 bg-light"> <i class="fa-solid fa-plus"></i> Agregar</a>
                        </div>
                    </td>
                    <td colspan="2" class="text-end">Totales:</td>
                    <td class="text-end">{{ partida.debe | currency }}</td>
                    <td class="text-end">{{ partida.haber | currency }}</td>
                </tr>
                <tr>
                    <td colspan="2" class="text-end">Diferencia:</td>
                    <td class="text-end" colspan="2">{{ partida.diferencia | currency }}</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>


<ng-template #mcuenta>
  <div class="modal-header">
    <h4 class="modal-title text-center">Cuenta</h4>
  </div>
  <div class="modal-body">
    <form name="form" (ngSubmit)="onsubmit()">
        <div class="row">

            <div class="form-group col-md-12">
                <label for="detalle.id_cuenta">Cuenta del catálogo:</label>
                <ng-select [(ngModel)]="detalle.cuenta" (change)="selectCuenta()" class="form-select p-0" name="detalle.cuenta">
                    <ng-option value="">Seleccione aquí</ng-option>
                    <div *ngFor="let cuenta of catalogo">
                        <ng-option  [value]="cuenta" *ngIf="cuenta.acepta_datos == 1">
                        <div class="d-flex align-items-center" >
                            <span style="width: 75px;">{{ cuenta.codigo }} </span>
                            <span class="col-8"> - {{ cuenta.nombre }}</span>
                        </div>
                        </ng-option>
                    </div>  
                </ng-select>
            </div>

            <div class="form-group col-md-12 col-lg-12">
                <label for="detalle.concepto">Concepto:</label>
                <input type="text" class="form-control" name="concepto" [(ngModel)]="detalle.concepto">
            </div>

            <div class="form-group col-md-12 col-lg-6">
                <label for="detalle.debe">Debe:</label>
                <input type="text" class="form-control" name="debe" [(ngModel)]="detalle.debe">
            </div>

            <div class="form-group col-md-12 col-lg-6">
                <label for="detalle.haber">Haber:</label>
                <input type="text" class="form-control" name="haber" [(ngModel)]="detalle.haber">
            </div>

            <div class="d-grid mt-4">
                <button [disabled]="loading" class="btn btn-primary btn-block">
                    <span *ngIf="!loading">Agregar</span>
                    <span *ngIf="loading">Agregando...</span>
                </button>
            </div>
        </div>
    </form>
  </div>
</ng-template>
