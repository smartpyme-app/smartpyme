<div class="d-flex justify-content-between bg-white rounded p-3 mb-3">
    <h3 (click)="loadAll()">{{ partida.id ? 'Editar ' : 'Crear ' }} Partida</h3>
    <div class="d-flex gap-2">
        <button (click)="openModal(mGenerarPartidas)" tooltip="Generar partidas del día" class="btn btn-default"> Generar partida <img
          src="/assets/icons/plus-circle.png" style="height: 16px; width: 16px;"></button>
        <button class="btn btn-light text-danger" routerLink="/contabilidad/partidas"><i class="fa fa-arrow-left"></i> Regresar</button>
    </div>
</div>

<form autocomplete="off" (ngSubmit)="onSubmit()">
    <div class="bg-white rounded p-3 mb-3">
        <div class="row">
            <div class="form-group col-md-6 col-lg-2">
                <label for="fecha">Fecha:</label>
                <input type="date" class="form-control" name="fecha" [(ngModel)]="partida.fecha"/>
            </div>
            <div class="form-group col-md-6 col-lg-2">
                <label for="tipo">Tipo:</label>
                <select class="form-select" name="tipo" [(ngModel)]="partida.tipo">
                    <option value="Ingreso">Ingreso</option>
                    <option value="Egreso">Egreso</option>
                    <option value="Diario">Diario</option>
                    <option value="CxC">CxC</option>
                    <option value="CxP">CxP</option>
                    <option value="Cierre">Cierre</option>
                </select>
            </div>
            <div class="form-group col-md-6 col-lg-2">
                <label for="estado">Estado:</label>
                <select class="form-select" name="estado" [(ngModel)]="partida.estado">
                    <option value="Pendiente">Pendiente</option>
                    <option value="Aplicada">Aplicada</option>
                    <option value="Anulada">Anulada</option>
                </select>
            </div>
            <div class="form-group col-md-12 col-lg-6">
                <label for="concepto">Concepto:</label>
                <input type="text" class="form-control" name="concepto" [(ngModel)]="partida.concepto"/>
            </div>
        </div>
    </div>

    <div class="bg-white rounded p-3">
        <app-partida-detalles [partida]="partida" (update)="updatePartida($event)" (sumTotal)="sumTotal()"></app-partida-detalles>
    </div>

    <div class="bg-white rounded p-3 mb-3">
        <div class="form-group col-sm-12 pt-2 pb-4">
            <button type="submit" [disabled]="saving || (partida.diferencia != 0)" class="btn btn-primary float-end tcla-F8" tooltip="Guardar (F8)">
                <span *ngIf="!saving">Guardar partida  <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
                <span *ngIf="saving">Guardando...</span>
            </button>
        </div>
    </div>

</form>

<ng-template #mGenerarPartidas>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center">Generar Partida del día</h2>
    </div>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-notificaciones-container></app-notificaciones-container>
    <form autocomplete="off" (ngSubmit)="generarPartidasDelDia()">
        <div class="row">

            <div class="form-group col-sm-12">
                <label for="">Fecha:</label>
                <input type='date' class="form-control" name="partida.fecha" [(ngModel)]="partida.fecha"/>
            </div>

            <div class="form-group col-sm-12">
                <label for="">Tipo:</label>
                <select name="tipo" class="form-select" [(ngModel)]="partida.tipo">
                    <option value="Ingreso">Ingreso</option>
                    <option value="Egreso">Egreso</option>
                </select>
            </div>
        </div>
        
        <div class="d-grid mt-3">
            <button type="submit" [disabled]="saving" class="btn btn-primary">
                <span *ngIf="!saving">Generar</span>
                <span *ngIf="saving">Generando...</span>
            </button>
        </div>
    </form>
  </div>
</ng-template>
