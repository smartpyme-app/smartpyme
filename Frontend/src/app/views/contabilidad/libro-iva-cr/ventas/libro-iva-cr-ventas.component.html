<section class="bg-white p-4 rounded mb-3">
  <h2 class="mb-0">Libros fiscales</h2>
</section>

<div class="bg-white p-4 rounded mb-3">
  <div class="d-flex flex-wrap gap-2 mb-3">
    <app-libro-iva-cr-nav />
    <div class="ms-auto d-flex gap-2 align-items-center">
      <app-libro-iva-periodo-filtros
        [filtros]="filtros"
        [years]="years"
        [sucursales]="sucursales"
        (periodoChange)="loadData()"
      />
      <div class="dropdown">
        <button class="btn btn-default dropdown-toggle" type="button" data-bs-toggle="dropdown" [disabled]="downloading">
          Descargas
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><button class="dropdown-item" (click)="descargarExcel()">Reporte detalle IVA (Excel)</button></li>
          <li><button class="dropdown-item" (click)="descargarCsv()">Reporte detalle IVA (CSV)</button></li>
        </ul>
      </div>
    </div>
  </div>

  <app-libro-iva-cr-detalle-table
    libroTipo="ventas"
    [filas]="ventas"
    [totales]="totales"
    [loading]="loading"
  />
</div>
