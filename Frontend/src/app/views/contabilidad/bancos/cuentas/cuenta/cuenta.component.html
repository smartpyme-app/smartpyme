<div class="d-flex justify-content-between bg-white rounded p-3 mb-3">
    <h3 (click)="loadAll()">{{ cuenta.id ? 'Editar ' : 'Crear ' }} Cuenta</h3>
    <button class="btn btn-light text-danger" routerLink="/cuentas"><i class="fa fa-arrow-left"></i> Regresar</button>
</div>

<form autocomplete="off" (ngSubmit)="onSubmit()">
    <div class="bg-white rounded p-3">
        <div class="row">

            <div class="form-group col-md-6 col-lg-4">
                <label for="nombre">Nombre del Banco:</label>
                <ng-select [(ngModel)]="cuenta.nombre_banco" class="form-select p-0" name="nombre_banco">
                    <ng-option value="">Seleccione aquí</ng-option>
                    <ng-option *ngFor="let banco of bancos" [value]="banco.nombre">
                        {{ banco.nombre }}
                    </ng-option>
                </ng-select>
            </div>
            <div class="form-group col-md-6 col-lg-4">
                <label for="tipo">Tipo de cuenta:</label>
                <select class="form-select" name="tipo" [(ngModel)]="cuenta.tipo">
                    <option value="De ahorro">De ahorro</option>
                    <option value="Corriente">Corriente</option>
                </select>
            </div>
            <div class="form-group col-md-12 col-lg-4">
                <label for="">Número de cuenta:</label>
                <input type="text" class="form-control" name="numero" [(ngModel)]="cuenta.numero"/>
            </div>
            <div class="form-group col-md-6 col-lg-4">
                <label for="">Saldo Inicial:</label>
                <input type="number" class="form-control" name="numero" [(ngModel)]="cuenta.saldo"/>
            </div>

        </div>
     </div>


    <div class="bg-white rounded p-3 mb-3">
        <div class="form-group col-sm-12 pt-2 pb-4">
            <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F8" tooltip="Guardar (F8)">
                <span *ngIf="!saving">Guardar cuenta  <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
                <span *ngIf="saving">Guardando...</span>
            </button>
        </div>
    </div>

</form>
