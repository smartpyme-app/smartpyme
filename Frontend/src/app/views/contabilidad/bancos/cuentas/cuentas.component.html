<section class="d-flex justify-content-between bg-white p-4 rounded mb-3">
    <h2 class="page-heading">Cuentas</h2>
    <button *ngIf="apiService.canCreateTest('finanzas.cuentas.crear')" routerLink="/bancos/cuenta/crear" tooltip="Crear cuenta (F4)" class="btn btn-default tcla-F4"><i class="fa fa-plus"></i> Añadir cuenta</button>
</section>

<section class="bg-white p-4 rounded mb-3">
    <div class="row">
        <div class="col-md-6 mb-3">
            <span class="text-muted" *ngIf="cuentas?.total">
                Mostrando {{ cuentas?.to }} de {{ cuentas?.total + ' registros' }}
            </span>
        </div>

        <div class="col-md-6 mb-3">
            <div class="d-flex gap-2">
                <form class="d-flex input-group" name="form" (ngSubmit)="filtrarCuentas()" autocomplete="off">
                    <input type="text" name="buscador" class="form-control pull-right" placeholder="Buscar" [(ngModel)]="filtros.buscador">
                </form>
                <!-- <button tooltip="Filtrar (F3)" (click)="openFilter(mfilter)" class="btn btn-default tcla-F3"> <img src="/assets/icons/filter.png" class="icon"> </button> -->
            </div>
        </div>
    </div>

    <div class="d-flex">
        <!-- <div class="col-md-6 d-flex gap-2 mb-3">
            <button class="tcla-F5 btn" tooltip="Actualizar (F5)" routerLinkActive="btn-primary" [routerLinkActiveOptions]="{exact: true}" (click)="loadAll()" routerLink="/bancos/cuentas">Todos</button>
            <button class="tcla-F7 btn" tooltip="Libro de bancos" (click)="openFilter(mfilter)">Libro de bancos</button>
        </div> -->
        <div class="col-md-6 d-flex gap-2 mb-3">
            <button class="btn" routerLinkActive="btn-primary" [routerLinkActiveOptions]="{exact: true}" routerLink="/bancos/conciliaciones">Conciliaciones</button>
            <button class="btn" routerLinkActive="btn-primary" [routerLinkActiveOptions]="{exact: true}" [routerLink]="['/bancos/transacciones']">Transacciones</button>
            <button class="btn" routerLinkActive="btn-primary" [routerLinkActiveOptions]="{exact: true}" [routerLink]="['/bancos/cheques']">Cheques</button>
            <button class="tcla-F5 btn" tooltip="Actualizar (F5)" routerLinkActive="btn-primary" (click)="loadAll()" [routerLinkActiveOptions]="{exact: true}" [routerLink]="['/bancos/cuentas']">Cuentas</button>
        </div>
    </div>
    <div class="row">
        <div class="table-responsive">
            <table class="table table-borderless table-hover mb-0">
                <thead>
                    <tr>
                        <th>Nombre de Banco</th>
                        <th>Número de cuenta</th>
                        <th>Tipo</th>
                        <th class="text-end">Saldo</th>
                        <th class="text-center">Más</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="text-center" *ngIf="cuentas?.total < 1 && !loading">
                            <span class="badge bg-primary">No tiene cuentas bancarias registrados</span>
                        </td>
                        <td colspan="5" class="text-center" *ngIf="loading">
                            <span class="badge bg-primary">Cargando...</span>
                        </td>
                    </tr>

                    <tr *ngFor=" let cuenta of cuentas?.data">
                        <td>{{cuenta.nombre_banco}}</td>
                        <td>{{cuenta.numero}}</td>
                        <td>{{cuenta.tipo}}</td>
                        <td class="text-end">{{cuenta.saldo | currency}}</td>
                        <td *ngIf="apiService.canEdit()" class="text-center">
                            <a class="btn btn-light" routerLink="/bancos/cuenta/{{cuenta.id}}" tooltip="Ver y editar">
                                <i class="fa fa-pencil-alt"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="col-12" *ngIf="cuentas?.last_page > 1">
            <app-pagination [items]="cuentas" (setPagination)="setPagination($event)"></app-pagination>
        </div>
    </div>
</section>

<ng-template #mfilter>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center">Libro de bancos</h2>
    </div>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form autocomplete="off" (ngSubmit)="imprimir(cuenta)">
        <div class="row">

            <div class="form-group col-md-6">
                <label for="">Del:</label>
                <input type='date' class="form-control" name="cuenta.del" [(ngModel)]="cuenta.del"/>
            </div>
            <div class="form-group col-md-6">
                <label for="">Al:</label>
                <input type='date' class="form-control" name="cuenta.al" [(ngModel)]="cuenta.al"/>
            </div>
            <div class="form-group col-md-12">
                <label for="cuenta.id">Cuentas:</label>
                <select [(ngModel)]="cuenta.id" class="form-control form-select" name="cuenta.id">
                    <option value="">Todos</option>
                    <option *ngFor="let cuenta of cuentas.data" [value]="cuenta.id">
                        {{ cuenta.nombre_banco }} - {{ cuenta.numero }}
                    </option>
                </select>
            </div>
        </div>
        
        <div class="d-grid mt-3">
            <button type="submit" [disabled]="loading" class="btn btn-primary">
                <span *ngIf="!loading">Generar</span>
                <span *ngIf="loading">Generando...</span>
            </button>
        </div>
    </form>
  </div>
</ng-template>
