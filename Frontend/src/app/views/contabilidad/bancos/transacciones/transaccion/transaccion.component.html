<div class="d-flex justify-content-between bg-white rounded p-3 mb-3">
    <h3 (click)="loadAll()">{{ transaccion.id ? 'Editar ' : 'Crear ' }} Transacción</h3>
    <button class="btn btn-light text-danger" routerLink="/bancos/transacciones"><i class="fa fa-arrow-left"></i> Regresar</button>
</div>

<form autocomplete="off" (ngSubmit)="onSubmit()">
    <div class="bg-white rounded p-3">
        <div class="row">
            <div class="form-group col-md-6 col-lg-3">
                <label for="fecha">Fecha:</label>
                <input type="date" class="form-control" name="fecha" [(ngModel)]="transaccion.fecha">
            </div>
            <div class="form-group col-md-6 col-lg-3">
                <label for="">Cuenta:</label>
                <ng-select [(ngModel)]="transaccion.id_cuenta" class="form-select p-0" name="id_cuenta">
                    <ng-option value="">Seleccione aquí</ng-option>
                    @for (cuenta of cuentas; track cuenta.id || $index) {
                      <ng-option [value]="cuenta.id">
                        {{ cuenta.nombre_banco }} : {{ cuenta.numero }}
                      </ng-option>
                    }
                </ng-select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="tipo">Tipo:</label>
                <select class="form-select" name="tipo" [(ngModel)]="transaccion.tipo">
                    <option value="">Seleccione aquí</option>
                    <option value="Cargo">Cargo</option>
                    <option value="Abono">Abono</option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="tipo_operacion">Operación:</label>
                <select class="form-select" name="tipo_operacion" [(ngModel)]="transaccion.tipo_operacion">
                    <option value="">Seleccione aquí</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Cheque">Cheque</option>
                    <option value="Depósito">Depósito</option>
                </select>
            </div>
            <div class="form-group col-md-12 col-lg-9">
                <label for="concepto">Concepto:</label><br>
                <input type="text" class="form-control" name="concepto" [(ngModel)]="transaccion.concepto"/>
            </div>
            <div class="form-group col-md-6 col-lg-3">
                <label for="">Total:</label>
                <input type="number" class="form-control" name="total" [(ngModel)]="transaccion.total"/>
            </div>
            @if (transaccion.id) {
              <div class="form-group col-md-6 col-lg-4">
                <label for="">Comprobante:</label>
                <div class="input-group">
                    <input type="file" name="img" [(ngModel)]="transaccion.url_referencia" class="form-control" (change)="setFile($event)" accept="image/jpeg, image/jpg, application/pdf" title="Agregar documento (jpg o pdf)">
                    @if (transaccion.url_referencia) {
                      <button type="button" class="btn btn-default" (click)="verDocumento(transaccion)" title="Ver documento">
                           <i class="fa fa-file"></i>
                      </button>
                    }
                </div>
              </div>
            }

        </div>
     </div>


    <div class="bg-white rounded p-3 mb-3">
        <div class="form-group col-sm-12 pb-4">
            <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F8" tooltip="Guardar (F8)">
                @if (!saving) {
                  <span>Guardar transaccion  <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
                }
                @if (saving) {
                  <span>Guardando...</span>
                }
            </button>
        </div>
    </div>

</form>
