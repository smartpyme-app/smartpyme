</section>

<section class="bg-white p-4 rounded mb-3">
    <div class="row mb-3">
        <div class="col">
            <span class="text-muted" *ngIf="sucursales?.total">
                Mostrando {{ sucursales?.to }} de {{ sucursales?.total + ' registros' }}
            </span>
        </div>

        <div class="col">
            <div class="d-flex gap-2">
                <form class="d-flex input-group" name="form" (ngSubmit)="loadAll()" autocomplete="off">
                    <div class="input-group">
                        <div class="input-group-text bg-white border-end-0">
                            <i class="fa fa-search text-muted"></i>
                        </div>
                        <input type="search" name="buscador" class="form-control pull-right border-start-0" placeholder="Buscar" [(ngModel)]="filtros.buscador">
                    </div>
                </form>
                <!-- <button tooltip="Filtrar (F3)" class="btn btn-default tcla-F3"><i class="fa fa-filter"></i></button> -->
            </div>
        </div>
    </div>

    <div class="d-flex mb-3">
        <div class="col d-flex gap-2">
            <button class="btn btn-primary tcla-F5" tooltip="Actualizar (F5)" (click)="loadAll()">Todos</button>
        </div>
        <div class="col d-flex gap-2 justify-content-end">
            <select name="estado" (change)="loadAll()"  [(ngModel)]="filtros.estado" class="form-select bg-default w-auto">
                <option value="">Estado</option>
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
            </select>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-borderless table-hover mb-0">
                <thead>
                    <tr>
                        <!-- <th>ID</th> -->
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <!-- <th>Municipio</th> -->
                        <th>Estado</th>
                        <th *ngIf="apiService.canEdit()" width="100px" class="text-center"><i class="fa fa-cog"></i></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="8" class="text-center" *ngIf="sucursales?.total < 1 && !loading">
                            <span class="badge bg-primary">No tiene sucursales registradas</span>
                        </td>
                        <td colspan="8" class="text-center" *ngIf="loading">
                            <span class="badge bg-primary">Cargando...</span>
                        </td>
                    </tr>
                    <tr *ngFor=" let sucursal of sucursales.data">
                        <!-- <td>{{ sucursal.id }}</td> -->
                        <td>{{ sucursal.nombre }}</td>
                        <td>{{ sucursal.telefono }}</td>
                        <!-- <td>{{ sucursal.municipio }}</td> -->
                        <td>
                            <select name="activo" class="form-select w-auto border-0" (change)="setEstado(sucursal)" [(ngModel)]="sucursal.activo" [ngClass]="{'bg-light-danger' : sucursal?.activo == '0', 'bg-light-success' : sucursal?.activo == '1'}">
                                <option value="1">Activo</option>
                                <option value="0">Inactivo</option>
                            </select>
                        </td>
                        <td *ngIf="apiService.canEdit()" class="text-center">
                            <div class="btn-group" role="group">
    <!--                             <a *ngIf="sucursal.id != 1" class="btn btn-default" (click)="delete(sucursal.id)" data-toggle="tooltip" title="Eliminar">
                                    <i class="fa fa-trash"></i>
                                </a> -->
                                <a class="btn btn-default" (click)="openModal(msucursal, sucursal)"  data-toggle="tooltip" title="Ver">
                                    <i class="fa fa-pencil-alt"></i>
                                </a>
                            </div>  
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<ng-template #msucursal>
  <div class="modal-header">
    <div class="modal-title">
        <h2 class="text-center">
            <span *ngIf="sucursal.id">Editar </span>
            <span *ngIf="!sucursal.id">Crear </span>
            sucursal
        </h2>
    </div>
    <button type="button" class="btn-close" (click)="closeModal()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form name="facturacion" autocomplete="off" (ngSubmit)="onSubmit()">
        <app-notificaciones-container></app-notificaciones-container>
        <div class="row">
            <div class="form-group col-lg-12">
                <label for="">Nombre:</label>
                <input type="text" class="form-control" name="sucursal.nombre" [(ngModel)]="sucursal.nombre" focus="true"/>
            </div>
            <div class="form-group col-lg-6">
                <label for="">Telefono:</label>
                <input type="tel" class="form-control" name="sucursal.telefono" [(ngModel)]="sucursal.telefono"/>
            </div>
            <div class="form-group col-lg-6">
                <label for="">Correo:</label>
                <input type="email" class="form-control" name="sucursal.correo" [(ngModel)]="sucursal.correo"/>
            </div>
            <div class="form-group col-lg-6">
                <label for="">Municipio:</label>
                <input type="text" class="form-control" name="sucursal.municipio" [(ngModel)]="sucursal.municipio"/>
            </div>
            <div class="form-group col-lg-6">
                <label for="">Departamento:</label>
                <input type="text" class="form-control" name="sucursal.departamento" [(ngModel)]="sucursal.departamento"/>
            </div>
            <div class="form-group col-lg-12">
                <label for="">Dirección:</label>
                <input type="text" class="form-control" name="sucursal.direccion" [(ngModel)]="sucursal.direccion"/>
            </div>
            <div class="form-group col-md-4">
                <label for="tipo_establecimiento ">Tipo establecimiento:</label>
                <select class="form-select" [(ngModel)]="sucursal.tipo_establecimiento" name="tipo_establecimiento ">
                    <option value="01">Sucursal</option>
                    <option value="02">Casa matriz</option>
                    <option value="04">Bodega</option>
                </select>
            </div>
            <div class="form-group col-md-4">
                <label for="cod_estable_mh">Cod Establecimiento MH:</label>
                <input type="text" class="form-control" [(ngModel)]="sucursal.cod_estable_mh" name="cod_estable_mh" placeholder="xxxx">
            </div>
            <div class="form-group col-md-4">
                <label for="codigo_punto_venta">Código Punto Venta:</label>
                <input type="text" class="form-control" [(ngModel)]="sucursal.codigo_punto_venta" name="codigo_punto_venta" placeholder="xxxx">
            </div>
            <div class="form-group col-md-12">
                <div class="form-switch bg-light-info rounded">
                  <label for="enable">Activa</label>
                  <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="sucursal.activo" name="activo">
                </div>
            </div>
        </div>
        
        <div class="d-grid mt-4">
            <button type="submit" [disabled]="saving" class="btn btn-primary btn-block">
                <span *ngIf="!saving">Guardar</span>
                <span *ngIf="saving">Guardando...</span>
            </button>
        </div>
    </form>
  </div>
</ng-template>
