<section class="d-flex justify-content-between bg-white p-4 rounded mb-3">
    <h2 class="page-heading" (click)="loadAll()">Cuenta</h2>
</section>

<form name="form" (ngSubmit)="onSubmit()">
<section class="bg-white p-4 rounded mb-3">
    <div class="row">
        <div class="col-md-12">
               <div class="row justify-content-center">
                   <div class="form-group col-6 col-sm-4 col-md-2">
                       <figure class="img-thumbnail file-upload d-flex justify-content-center align-items-center" tooltip="Agregar" style="min-height: 100px;">
                           <img class="img-fluid" src="{{ apiService.baseUrl + '/img/' + empresa.logo }}" alt="logo">
                           <input type="file" name="img" (change)="setFile($event)" accept="image/png, image/jpeg, image/jpg">
                       </figure>
                   </div>
               </div>
                <h5 class="mb-3">Datos de mi empresa</h5>
                <div class="row">
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="nombre">Nombre</label>
                        <input type="text" class="form-control" [(ngModel)]="empresa.nombre" name="nombre" placeholder="Escriba aquí" required>
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="nombre_propietario">Propietario</label>
                        <input type="text" class="form-control" [(ngModel)]="empresa.nombre_propietario" name="nombre_propietario" placeholder="Escriba aquí">
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" class="form-control" [(ngModel)]="empresa.telefono" name="telefono" placeholder="Escriba aquí">
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="correo">Correo</label>
                        <input type="email" class="form-control" [(ngModel)]="empresa.correo" name="correo" placeholder="Escriba aquí">
                    </div>
                    <div class="form-group col-md-4">
                        <label for="departamento">Departamento:</label>
                        <ng-select [(ngModel)]="empresa.cod_departamento" (change)="setDepartamento()" class="form-select p-0" name="empresa.departamento">
                            <ng-option *ngFor="let departamento of departamentos" [value]="departamento.cod">
                                {{ departamento.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-md-4">
                        <label for="municipio">Municipio:</label>
                        <ng-select [(ngModel)]="empresa.cod_municipio" (change)="setMunicipio()" class="form-select p-0" name="empresa.municipio">
                            <ng-option *ngFor="let municipio of municipios | filter:'nombre_departamento':empresa.departamento" [value]="municipio.cod">
                                {{ municipio.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="direccion">Dirección</label>
                        <input type="text" class="form-control" [(ngModel)]="empresa.direccion" name="direccion" placeholder="Escriba aquí">
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="nit">NIT</label>
                        <input type="text" class="form-control" [(ngModel)]="empresa.nit" name="nit" placeholder="Escriba aquí" [dropSpecialCharacters]="false" mask='0000-000000-000-0'>
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="ncr">NCR</label>
                        <input type="text" class="form-control" [(ngModel)]="empresa.ncr" name="ncr" placeholder="Escriba aquí">
                    </div>
                    <!-- <div class="form-group col-md-6 col-lg-4">
                        <label>Tipo de negocio</label>
                        <select class="form-select" name="industria" [(ngModel)]="empresa.industria">
                            <option value="Comercio">Comercio</option>
                            <option value="Servicio">Servicio</option>
                            <option value="Ambos">Ambos</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div> -->
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="tipo_contribuyente">Tamaño</label>
                        <select class="form-select" [(ngModel)]="empresa.tipo_contribuyente" name="tipo_contribuyente">
                            <option value="">Seleccione aquí</option>
                            <option value="Pequeño">Pequeño</option>
                            <option value="Mediano">Mediano</option>
                            <option value="Grande">Grande</option>
                        </select>
                    </div>
                    <div class="form-group col-md-4">
                        <label for="tipo_establecimiento ">Tipo establecimiento:</label>
                        <select class="form-control" [(ngModel)]="empresa.tipo_establecimiento" name="tipo_establecimiento ">
                            <option value="01">Sucursal/Agencia</option>
                            <option value="02">Casa matriz</option>
                            <option value="04">Bodega</option>
                            <option value="20">Otro</option>
                        </select>
                    </div>
                    <div class="form-group col-md-4">
                        <label for="cod_estable_mh">Cod Establecimiento MH:</label>
                        <input type="text" class="form-control" [(ngModel)]="empresa.cod_estable_mh" name="cod_estable_mh" placeholder="xxxx">
                    </div>
                    <div class="form-group col-md-4">
                        <label for="cod_estable">Cod Establecimiento:</label>
                        <input type="text" class="form-control" [(ngModel)]="empresa.cod_estable" name="cod_estable" placeholder="xxxx">
                    </div>
                    <div class="form-group col-md-8">
                        <label for="actividad_economica">Actividad económica:</label>
                        <ng-select [(ngModel)]="empresa.cod_actividad_economica" (change)="setGiro()" class="form-select p-0" name="empresa.cod_actividad_economica">
                            <ng-option *ngFor="let actividad_economica of actividad_economicas" [value]="actividad_economica.cod">
                                {{ actividad_economica.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="pais">País:</label>
                        <select class="form-select" name="pais" (change)="setPais()" [(ngModel)]="empresa.pais">
                            <option value="Belice">+501 Belice</option>
                            <option value="Guatemala">+502 Guatemala</option>
                            <option value="El Salvador">+503 El Salvador</option>
                            <option value="Honduras">+504 Honduras</option>
                            <option value="Nicaragua">+505 Nicaragua</option>
                            <option value="Costa Rica">+506 Costa Rica</option>
                            <option value="Panamá">+507 Panamá</option>
                        </select>
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="moneda">Moneda:</label>
                        <select class="form-select" [(ngModel)]="empresa.moneda" name="moneda">
                            <option value="">Seleccione aquí</option>
                            <option value="USD">USD</option>
                            <option value="GTQ">GTQ</option>
                            <option value="CRC">CRC</option>
                            <option value="HNL">HNL</option>
                            <option value="BZD">BZD</option>
                            <option value="NIO">NIO</option>
                            <option value="PAB">PAB</option>
                        </select>
                    </div>
                    <div class="form-group col-md-6 col-lg-4">
                        <label for="iva">IVA</label>
                        <div class="input-group">
                            <input type="number" class="form-control" [(ngModel)]="empresa.iva" name="iva" placeholder="Escriba aquí">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    <!-- <div class="form-group col-md-12">
                        <label for="descripcion">Descripción</label>
                        <input type="text" class="form-control" [(ngModel)]="empresa.descripcion" name="descripcion" placeholder="Escriba aquí">
                    </div> -->
                </div>

                <div class="row mt-3">
                    <h5 class="my-3">Preferencias del sistema</h5>
                    <p class="mb-0 fw-bold">Módulos habilitados</p>
                    <div class="form-group col-md-6 col-xl-3 without-label">
                        <div class="form-switch bg-light-info rounded">
                          <label for="modulo_citas">Módulo de citas</label>
                          <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="empresa.modulo_citas" name="modulo_citas">
                        </div>
                    </div>
                    <div *ngIf="apiService.auth_user().empresa.plan == 'Pro'" class="form-group col-md-6 col-xl-3 without-label">
                        <div class="form-switch bg-light-info rounded">
                          <label for="modulo_citas">Módulo de proyectos</label>
                          <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="empresa.modulo_proyectos" name="modulo_proyectos">
                        </div>
                    </div>
                    <div *ngIf="apiService.auth_user().empresa.plan == 'Pro'" class="form-group col-md-6 col-xl-3 without-label">
                        <div class="form-switch bg-light-info rounded">
                          <label for="modulo_citas">Módulo de paquetes</label>
                          <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="empresa.modulo_paquetes" name="modulo_paquetes">
                        </div>
                    </div>
                    <p class="mb-0 fw-bold">Facturación</p>
                    <div class="form-group col-md-6 col-xl-3 without-label">
                        <div class="form-switch bg-light-info rounded">
                          <label for="cobrar_iva">Cobrar IVA</label>
                          <input class="form-check-input float-end" type="checkbox" (change)="setCobrarIVA()" role="switch" [checked]="empresa.cobra_iva == 'Si'">
                        </div>
                    </div>
                    <div class="form-group col-md-6 col-xl-3 without-label">
                        <div class="form-switch bg-light-info rounded">
                          <label for="vender_sin_stock">Vender sin stock</label>
                          <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="empresa.vender_sin_stock" name="vender_sin_stock">
                        </div>
                    </div>

                    <div class="form-group col-md-6 col-xl-3 without-label">
                        <div class="form-switch bg-light-info rounded">
                          <label for="editar_precio_venta">Editar precio venta</label>
                          <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="empresa.editar_precio_venta" name="editar_precio_venta">
                        </div>
                    </div>

                    <div class="form-group col-md-6 col-xl-3 without-label">
                        <div class="form-switch bg-light-info rounded">
                          <label for="editar_descripcion_venta">Editar descripción venta</label>
                          <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="empresa.editar_descripcion_venta" name="editar_descripcion_venta">
                        </div>
                    </div>

                    <div class="form-group col-md-6 col-xl-4 without-label">
                        <div class="form-switch bg-light-info rounded">
                          <label for="impresion_en_facturacion">Imprimir al momento de facturar</label>
                          <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="empresa.impresion_en_facturacion" name="impresion_en_facturacion">
                        </div>
                    </div>


                    <p class="my-3 pt-5">
                        ¿Quieres eliminar los datos de tu cuenta?
                        <a routerLink="/eliminar-datos" class="btn btn-link">Ingresa acá</a>
                    </p>

                </div>

                <form name="form" (ngSubmit)="onSubmit()">
                <div class="row">
                        <div class="form-group col-md-4">
                            <label for="mh_usuario">Usuario MH:</label>
                            <input type="text" class="form-control" [(ngModel)]="empresa.mh_usuario" name="mh_usuario" placeholder="Escribe aquí">
                        </div>
                        <div class="form-group col-md-4">
                            <label for="mh_contrasena">Contraseña MH:</label>
                            <input type="text" class="form-control" [(ngModel)]="empresa.mh_contrasena" name="mh_contrasena" placeholder="Escribe aquí">
                        </div>
                        <div class="form-group col-md-4">
                            <label for="mh_pwd_certificado">Contraseña Certificado MH:</label>
                            <input type="text" class="form-control" [(ngModel)]="empresa.mh_pwd_certificado" name="mh_pwd_certificado" placeholder="Escribe aquí">
                        </div>
                        <div class="col-md-12">
                            <button [disabled]="saving" class="btn btn-primary pull-right">
                                <span *ngIf="!saving">Guardar</span>
                                <span *ngIf="saving">Guardando...</span>
                            </button>
                            <button [disabled]="saving" type="button" (click)="onCheckMH()" class="btn btn-primary pull-right">
                                <span *ngIf="!saving">Comprobar MH</span>
                                <span *ngIf="saving">Comprobando...</span>
                            </button>
                            <button [disabled]="saving" type="button" (click)="onCheckFE()" class="btn btn-primary pull-right">
                                <span *ngIf="!saving">Comprobar FE</span>
                                <span *ngIf="saving">Comprobando...</span>
                            </button>
                        </div>  
                </div>
                </form>

        </div>
    </div>

</section>
<div class="bg-white rounded p-3 mb-3">
    <div class="form-group col-sm-12 pt-2 pb-4">
        <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F8" tooltip="Guardar (F8)">
            <span *ngIf="!saving">Guardar <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
            <span *ngIf="saving">Guardando...</span>
        </button>
    </div>
</div>
</form>
