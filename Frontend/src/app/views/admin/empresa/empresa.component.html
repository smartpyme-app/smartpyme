<div class="row page-titles mx-0 px-0 pb-2">
    <div class="col-sm-6 p-md-0">
        <h2 class="page-heading">Negocio <small class="text-muted p-2"> Configuración</small></h2>
    </div>
    <div class="col-sm-6 p-md-0 justify-content-sm-end mt-2 mt-sm-0 d-flex">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a routerLink="/">Dash</a></li>
            <li class="breadcrumb-item active"><a href="javascript:void(0)">Negocio</a></li>
        </ol>
    </div>
</div>

<div class="card mb-5">
    <div class="card-body">
        <div class="row" *ngIf="!empresa.nombre">
            <div class="text-muted text-center thumbler">
              Cargando...
            </div>
        </div>

        <div class="row" *ngIf="empresa.nombre">   
            <h5 class="mb-3">Información</h5>
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <form name="form" (ngSubmit)="onSubmit()">
                            <div class="row">
                               <div class="row justify-content-center">
                                   <div class="form-group col-6 col-sm-4 col-md-2">
                                       <figure class="img-thumbnail file-upload d-flex justify-content-center align-items-center" tooltip="Agregar" style="min-height: 100px;">
                                           <img class="img-fluid" src="{{ apiService.baseUrl + '/img/' + empresa.logo }}" alt="logo">
                                           <input type="file" name="img" (change)="setFile($event)" accept="image/png, image/jpeg, image/jpg">
                                       </figure>
                                   </div>
                               </div>
                                <div class="form-group col-md-3">
                                    <label for="nombre">* Nombre:</label>
                                    <input type="text" class="form-control" [(ngModel)]="empresa.nombre" name="nombre" placeholder="Nombre" required>
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="propietario">Propietario:</label>
                                    <input type="text" class="form-control" [(ngModel)]="empresa.propietario" name="propietario" placeholder="Propietario">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="nit">NIT:</label>
                                    <input type="text" class="form-control" [(ngModel)]="empresa.nit" name="nit" placeholder="000-000000-000-0">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="registro">NCR:</label>
                                    <input type="text" class="form-control" [(ngModel)]="empresa.registro" name="registro" placeholder="000000-0">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="sector">Sector:</label>
                                    <input type="text" class="form-control" [(ngModel)]="empresa.sector" name="sector" placeholder="Sector">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="giro">Giro:</label>
                                    <input type="text" class="form-control" [(ngModel)]="empresa.giro" name="giro" placeholder="Giro">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="tamano">Tamaño:</label>
                                    <input type="text" class="form-control" [(ngModel)]="empresa.tamano" name="tamano" placeholder="Tamaño">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="telefono">Teléfono:</label>
                                    <input type="tel" class="form-control" [(ngModel)]="empresa.telefono" name="telefono" placeholder="xxxx-xxxx">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="correo">Correo:</label>
                                    <input type="email" class="form-control" [(ngModel)]="empresa.correo" name="correo" placeholder="info@miempresa.com">
                                </div>
                                <div class="form-group col-sm-3">
                                    <label for="valor_inventario">Valor de inventario:</label>
                                    <select class="form-control form-select" [(ngModel)]="empresa.valor_inventario" name="valor_inventario">
                                        <option value="Promedio">Promedio</option>
                                        <option value="Última compra">Última compra</option>
                                    </select>
                                </div>
                                <div class="form-group col-lg-6">
                                    <label for="ips">Desde donde se pueden conectar los empleados</label>
                                    <tag-input theme='bootstrap' [secondaryPlaceholder]="'45.195.206.110'" [separatorKeyCodes]="[32]" [(ngModel)]="empresa.ips" name="ips"></tag-input>
                                </div>
                                <div class="form-group col-md-12">
                                    <button [disabled]="loading" class="btn btn-primary float-end">
                                        <span *ngIf="!loading">Guardar</span>
                                        <span *ngIf="loading">Guardando...</span>
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
<!--             <div class="col-md-12">
                <app-sucursales></app-sucursales>
            </div> -->

        </div>
    </div>
</div>
