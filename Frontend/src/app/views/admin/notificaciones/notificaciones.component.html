<section class="d-flex justify-content-between bg-white p-4 rounded mb-3">
    <h2 class="page-heading">Notificaciones</h2>
</section>

<section class="bg-white p-4 rounded mb-3">
    <div class="row mb-3">
        <div class="col">
            <span class="text-muted" *ngIf="notificaciones?.total">
                Mostrando {{ notificaciones?.to }} de {{ notificaciones?.total + ' registros' }}
            </span>
        </div>

        <div class="col">
            <div class="d-flex gap-2">
                <input type="text" name="search" class="form-control pull-right" placeholder="Buscar" [(ngModel)]="filtro.nombre">
                <button tooltip="Filtrar (F3)" class="btn btn-default tcla-F3"><i class="fa fa-filter"></i></button>
            </div>
        </div>
    </div>

    <div class="d-flex mb-3">
        <div class="col d-flex gap-2">
            <button class="btn btn-primary" (click)="loadAll()">Todos</button>
            <!-- <button class="btn btn-default">Traslados</button> -->
        </div>
        <div class="col d-flex gap-2 justify-content-end">
            <select name="estado"  [(ngModel)]="filtro.estado" class="form-select bg-default w-auto">
                <option value="">Prioridad</option>
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
            </select>
            <select name="estado"  [(ngModel)]="filtro.estado" class="form-select bg-default w-auto">
                <option value="">Estado</option>
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
            </select>
        </div>
    </div>
    <div class="row">
        <table class="table table-borderless table-hover">
            <thead>
                <tr>
                    <th>Descripcion</th>
                    <th>Tipo</th>
                    <th>Prioridad</th>
                    <!-- <th class="text-center">Leido</th> -->
                    <th class="text-center"><i class="fa fa-cog"></i></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="9" class="text-center" *ngIf="notificaciones?.total < 1 && !loading">
                        <span class="badge bg-primary">No tiene notificaciones registrados</span>
                    </td>
                    <td colspan="9" class="text-center" *ngIf="loading">
                        <span class="badge bg-primary">Cargando...</span>
                    </td>
                </tr>

                <tr (click)="openModal(mnotificacion, notificacion)" class="click" [ngClass]="{ 'fw-bold' : notificacion.leido == '0' }" *ngFor=" let notificacion of notificaciones?.data">                    
                    <td><span [innerHTML]="notificacion.descripcion | truncate:30"></span></td>
                    <td>{{notificacion.tipo}}</td>
                    <td>{{notificacion.prioridad}}</td>
                    <!-- <td class="text-center" >
                        <input type="checkbox" [(ngModel)]="notificacion.leido" (change)="setEstado(notificacion)">
                    </td> -->
                    <td class="text-center">
                        <div class="btn-group" role="group">
                            <a *ngIf="notificacion.id != 1" class="btn btn-default" (click)="delete(notificacion.id)" data-toggle="tooltip" title="Eliminar">
                                <i class="fa fa-trash"></i>
                            </a>
                            <a class="btn btn-default" routerLink="/notificacion/{{notificacion.id}}" data-toggle="tooltip" title="Ver">
                                <i class="fa fa-arrow-right"></i>
                            </a>
                        </div>  
                    </td>

                </tr>
            </tbody>
        </table>

        <div class="col-12" *ngIf="notificaciones?.last_page > 1">
            <app-pagination [items]="notificaciones" (setPagination)="setPagination($event)"></app-pagination>
        </div>
    </div>
</section>

<ng-template #mnotificacion>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center no-margin">Notificación</h2>
    </div>
   <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <!-- <form autocomplete="off" (ngSubmit)="onSubmit()"> -->
        <div class="row">
            <div [innerHTML]="notificacion.titulo"></div> 
            <div [innerHTML]="notificacion.descripcion"></div> 
        </div>
    <!-- </form> -->
  </div>
</ng-template>

<ng-template #mfilter>
  <div class="modal-header">
    <div class="modal-title text-center">
        <h2 class="text-center no-margin">Filtros</h2>
    </div>
    <button type="button" class="btn-close" (click)="modalRef.hide()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form autocomplete="off" (ngSubmit)="onFiltrar()">
        <div class="row text-center">

            <div class="form-group col-sm-12">
                <label for="filtro.sucursal">Sucursal:</label>
                <select [(ngModel)]="filtro.sucursal_id" class="form-control form-select" name="filtro.sucursal_id">
                    <option value="">Todos</option>
                    <option *ngFor="let sucursal of sucursales" [ngValue]="sucursal.id">
                        {{ sucursal.nombre }}
                    </option>
                </select>
            </div>
            <div class="form-group col-md-12">
                <label for="tipo">* Tipo:</label>
                <select name="tipo" [(ngModel)]="filtro.tipo" class="form-control form-select">
                    <option value="">Todos</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Supervisor">Supervisor</option>
                    <option value="Vendedor">Vendedor</option>
                    <option value="Cajero">Cajero</option>
                </select>
            </div>

        </div>
        <br><br>
        <div class="row text-center">
            <div class="col-xs-12">
                <button type="submit" [disabled]="loading" class="btn btn-primary btn-block">
                    <span *ngIf="!loading">Filtrar</span>
                    <span *ngIf="loading">Filtrando...</span>
                </button>
            </div>
        </div>
    </form>
  </div>
</ng-template>
