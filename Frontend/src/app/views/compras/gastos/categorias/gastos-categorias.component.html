<section class="d-flex justify-content-between bg-white p-4 rounded mb-3">
    <h2 class="page-heading">Categorias de gastos</h2>
    <button (click)="openModal(mdetalle, {})"  tooltip="Crear categoria (F7)" class="btn btn-default tcla-F7"><i class="fa fa-plus"></i> Añadir categoria</button>
</section>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-borderless table-hover mb-0">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cuenta contable</th>
                        <th class="text-center"><i class="fa fa-cog"></i></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="10" class="text-center" *ngIf="categorias?.length < 1 && !loading">
                            <span class="badge badge-info">No tiene categorias registradas</span>
                        </td>
                        <td colspan="10" class="text-center" *ngIf="loading">
                            <span class="badge badge-info">Cargando...</span>
                        </td>
                    </tr>

                    <tr class="animated fadeIn" *ngFor=" let categoria of categorias">
                        
                        <td>{{categoria.nombre }} </td>
                        <td>{{categoria.cuenta?.nombre }} </td>
                        <td class="text-center">
                            <div class="btn-group" role="group">
                                <a class="btn btn-default" (click)="delete(categoria.id)" tooltip="Eliminar">
                                    <i class="fa fa-trash"></i>
                                </a>
                                <a class="btn btn-default" (click)="openModal(mdetalle, categoria)" tooltip="Editar">
                                    <i class="fa fa-pencil-alt"></i>
                                </a>
                            </div>  
                        </td>

                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>


<ng-template #mdetalle>
  <div class="modal-header">
    <div class="modal-title">
        <h2>Categoria</h2>
    </div>
    <button type="button" class="btn-close" (click)="modalRef.hide(); this.alertService.modal = false;" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-notificaciones-container></app-notificaciones-container>
    <form autocomplete="off" (ngSubmit)="onSubmit()">
        <div class="row">
            <div class="form-group col-lg-12">
                <label for="categoria.nombre">Nombre</label>
                <input type="text" class="form-control" [(ngModel)]="categoria.nombre" name="categoria.nombre">
            </div>
            <div class="form-group col-md-12">
                <label for="categoria.id_cuenta_contable">Cuenta contable:</label>
                <ng-select [(ngModel)]="categoria.id_cuenta_contable" class="form-select p-0" name="categoria.id_cuenta_contable">
                    <ng-option value="">Seleccione aquí</ng-option>
                    <ng-option *ngFor="let cuenta of catalogo" [value]="cuenta.id">
                        <div class="d-flex align-items-center">
                            <span style="width: 75px;">{{ cuenta.codigo }} </span>
                            <span class="col-8"> - {{ cuenta.nombre }}</span>
                        </div>
                    </ng-option>
                </ng-select>
            </div>
        </div>
        <div class="d-grid">
            <button type="submit" [disabled]="saving" class="btn btn-primary btn-block">
                <span *ngIf="!saving">Guardar</span>
                <span *ngIf="saving">Guardando...</span>
            </button>
        </div>
    </form>
  </div>
</ng-template>
