<div class="d-flex justify-content-between bg-white rounded p-3 mb-3">
    <h3 (click)="loadAll()">{{ gasto.id ? 'Editar ' : 'Crear ' }} Gasto</h3>
    <button class="btn btn-light text-danger" routerLink="/gastos"><i class="fa fa-arrow-left"></i> Regresar</button>
</div>

<form autocomplete="off" (ngSubmit)="onSubmit()">
    <div class="bg-white rounded p-3">
        <div class="row">
            <div class="form-group col-md-4 col-lg-3">
                <label for="">Fecha:</label>
                <input type='date' class="form-control" name="fecha" [(ngModel)]="gasto.fecha"/>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="id_usuario">Usuario:</label>
                <select name="id_usuario" [(ngModel)]="gasto.id_usuario" class="form-select">
                    <option [value]="usuario.id" *ngFor="let usuario of usuarios">
                        {{ usuario.name }}
                    </option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="tipo_documento">Documento:</label>
                <select class="form-select" name="tipo_documento" [(ngModel)]="gasto.tipo_documento">
                    <option value="Factura">Factura</option>
                    <option value="Crédito fiscal">Crédito fiscal</option>
                    <option value="Ticket">Ticket</option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="referencia">Referencia:</label>
                <input type="text" class="form-control" name="referencia" [(ngModel)]="gasto.referencia" placeholder="Escriba aquí" />
            </div>
        </div>
     </div>
     <div class="bg-white rounded p-3 mb-3">
        <h6>Detalle de gasto</h6>
        <div class="row">
            <div class="form-group col-md-4 col-lg-3">
                <label for="id_sucursal">Sucursal:</label>
                <select name="id_sucursal" [(ngModel)]="gasto.id_sucursal" class="form-select">
                    <option [value]="sucursal.id" *ngFor="let sucursal of sucursales">
                        {{ sucursal.nombre }}
                    </option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="id_proveedor" class="w-100">Proveedor:</label>
                <div class="input-group flex-nowrap">
                    <ng-select name="id_proveedor" [(ngModel)]="gasto.id_proveedor" class="form-select p-0">
                        <ng-option value="">Seleccione aquí</ng-option>
                        <ng-option *ngFor="let proveedor of proveedores" [value]="proveedor.id">
                            {{ proveedor.tipo == 'Persona' ? proveedor.nombre_completo : proveedor.nombre_empresa | truncate:30 }}
                        </ng-option>
                    </ng-select>
                    <app-crear-proveedor (update)="setProveedor($event)"></app-crear-proveedor>
                </div>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="id_categoria" class="w-100">Categoria:</label>
                <div class="input-group flex-nowrap">
                    <!-- <ng-select name="id_categoria" [(ngModel)]="gasto.id_categoria" class="form-select p-0">
                        <ng-option value="">Seleccione aquí</ng-option>
                        <ng-option *ngFor="let categoria of categorias" [value]="categoria.id">
                            {{categoria.nombre}}
                        </ng-option>
                    </ng-select> -->
                    <select name="tipo" [(ngModel)]="gasto.tipo" class="form-select">
                        <option value="">Seleccione aquí</option>
                        <option value="Alquiler">Alquiler</option>
                        <option value="Agua">Agua</option>
                        <option value="Combustible">Combustible</option>
                        <option value="Costo de venta">Costo de venta</option>
                        <option value="Energía eléctrica">Energía eléctrica</option>
                        <option value="Gastos varios">Gastos varios</option>
                        <option value="Insumos">Insumos</option>
                        <option value="Insumos de oficina">Insumos de oficina</option>
                        <option value="Impuestos">Impuestos</option>
                        <option value="Gastos Administrativos">Gastos Administrativos</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Materia Prima">Materia Prima</option>
                        <option value="Servicios">Servicios</option>
                        <option value="Pago comisión">Pago comisión</option>
                        <option value="Planilla">Planilla</option>
                        <option value="Préstamos">Préstamos</option>
                        <option value="Publicidad">Publicidad</option>
                    </select>
                    <!-- <app-crear-categoria-gasto (update)="setCategoria($event)"></app-crear-categoria-gasto> -->
                </div>
            </div>
        </div>
    </div>
    <div class="bg-white rounded p-3 mb-3">
        <h6>Detalle de facturación</h6>
        <div class="row">
            <div class="form-group col-md-12 col-lg-6">
                <label for="">Concepto:</label>
                <input type="text" class="form-control" name="concepto" [(ngModel)]="gasto.concepto" placeholder="Escriba aquí" />
            </div>
            <div class="form-group col-md-4 col-lg-2">
                <label for="">Sub total:</label>
                <input type='number' class="form-control" name="sub_total" [(ngModel)]="gasto.sub_total"/>
            </div>
            <div class="form-group col-md-4 col-lg-2">
                <label for="">IVA:</label>
                <input type='number' class="form-control" name="iva" [(ngModel)]="gasto.iva"/>
            </div>
            <div class="form-group col-md-4 col-lg-2">
                <label for="">Total:</label>
                <input type='number' class="form-control" name="total" [(ngModel)]="gasto.total"/>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="forma_pago">Forma de pago:</label>
                <select name="forma_pago" [(ngModel)]="gasto.forma_pago" class="form-select" id="forma_pago">
                    <option value="{{ forma.nombre }}" *ngFor="let forma of formaspago">{{ forma.nombre }}</option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="detalle_banco">Bancos:</label>
                <select [disabled]="gasto.forma_pago == 'Efectivo'" name="detalle_banco" [(ngModel)]="gasto.detalle_banco" class="form-select">
                    <option value="">Seleccione aquí</option>
                    <option [value]="banco.nombre" *ngFor="let banco of bancos">{{ banco.nombre }}</option>
                </select>
            </div>
            <div class="form-group col-md-4 col-lg-3 without-label">
                <div class="form-switch border rounded">
                  <label for="credito">Pendiente</label>
                  <input class="form-check-input float-end" type="checkbox" role="switch" (change)="setCredito()" [(ngModel)]="gasto.credito" name="credito">
                </div>
            </div>
            <div class="form-group col-md-4 col-lg-3">
                <label for="fecha_pago">Fecha de pago:</label><br>
                <input [disabled]="!gasto.credito" type="date" class="form-control" [(ngModel)]="gasto.fecha_pago" name="fecha_pago" id="fecha_pago">
            </div>
            <div class="form-group col-md-4 col-lg-3 without-label ">
                <div class="form-switch bg-light-info rounded">
                  <label for="recurrente">Recurrente</label>
                  <input class="form-check-input float-end" type="checkbox" role="switch" [(ngModel)]="gasto.recurrente" name="recurrente">
                </div>
            </div>
            <div class="form-group col-md-4 col-lg-3 without-label ">
                <div class="form-switch bg-light-info rounded">
                  <label for="impuesto">IVA</label>
                  <input class="form-check-input float-end" type="checkbox" role="switch" (change)="setIva()" [(ngModel)]="gasto.impuesto" name="impuesto">
                </div>
            </div>
            <div class="form-group col-md-12">
                <label for="">Observaciones:</label>
                <input type="text" class="form-control" name="nota" [(ngModel)]="gasto.nota" placeholder="Escriba aquí" />
            </div>
        </div>
    </div>
    <div class="bg-white rounded p-3 mb-3">
        <div class="form-group col-sm-12 pt-2 pb-4">
            <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F8" tooltip="Procesar (F8)">
                <span *ngIf="!saving">Procesar gasto  <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
                <span *ngIf="saving">Procesando...</span>
            </button>
        </div>
    </div>
</form>
