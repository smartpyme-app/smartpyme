<section class="d-flex justify-content-between bg-white p-4 rounded mb-3">
    <h2 class="page-heading">Proveedor</h2>
    <button class="btn btn-light text-danger" routerLink="/proveedores"><i class="fa fa-arrow-left"></i> Regresar</button>
</section>

<div class="card mb-3">
    <div class="card-body">

    <form (ngSubmit)="onSubmit()">
        <div class="row mb-3">
            <div class="col d-grid">
                <input type="radio" class="btn-check" name="tipo" [(ngModel)]="proveedor.tipo" id="option1" (change)="setTipo('Persona')">
                <label class="btn" [ngClass]="{'btn-default' : proveedor.tipo == 'Persona', 'btn-light' : proveedor.tipo == 'Empresa' }" for="option1">Persona</label>
            </div>
            <div class="col d-grid">
                <input type="radio" class="btn-check" name="tipo" [(ngModel)]="proveedor.tipo" id="option2" (change)="setTipo('Empresa')">
                <label class="btn" [ngClass]="{'btn-default' : proveedor.tipo == 'Empresa', 'btn-light' : proveedor.tipo == 'Persona' }" for="option2">Empresa</label>
            </div>
        </div>
        <div class="row">
            <div class="col-12" [ngClass]="{ 'order-1' :  proveedor.tipo == 'Persona', 'order-2' :  proveedor.tipo == 'Empresa' }">
                <div class="row">
                    <h6 class="col-12 pb-2 mb-2">Información de contacto</h6>
                    <div class="form-group col-lg-4">
                        <label for="nombre">Nombre</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="nombre" [(ngModel)]="proveedor.nombre">
                    </div>
                    <div class="form-group col-lg-4">
                        <label for="apellido">Apellido</label>
                        <input type="text" class="form-control" (change)="verificarSiExiste()" placeholder="Escribe aquí" name="apellido" [(ngModel)]="proveedor.apellido">
                    </div>
                    <div class="form-group col-6 col-lg-4">
                        <label for="dui">DUI</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="dui" [(ngModel)]="proveedor.dui" [dropSpecialCharacters]="false" mask='00000000-0'>
                    </div>
                    <div class="form-group col-6 col-lg-4">
                        <label for="correo">Correo</label>
                        <input type="email" class="form-control" placeholder="Escribe aquí" name="correo" [(ngModel)]="proveedor.correo">
                    </div>
                    <div class="form-group col-6 col-lg-4">
                        <label for="telefono">Teléfono:</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="telefono" [(ngModel)]="proveedor.telefono">
                    </div>
                    <div class="form-group col-6 col-lg-4" *ngIf="proveedor.tipo == 'Persona'">
                        <label for="pais">Pais:</label>
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica" type="text" class="form-control" placeholder="Escribe aquí" name="pais" [(ngModel)]="proveedor.pais">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica" [(ngModel)]="proveedor.cod_pais" (change)="setPais()" placeholder="Escribe aquí" class="form-control form-select p-0" name="proveedor.cod_pais">
                            <ng-option *ngFor="let pais of paises" [value]="pais.cod">
                                {{ pais.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-6 col-lg-4" *ngIf="proveedor.tipo == 'Persona'">
                        <label for="departamento">Departamento:</label>
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica" type="text" class="form-control" placeholder="Escribe aquí" name="departamento" [(ngModel)]="proveedor.departamento">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica" [(ngModel)]="proveedor.cod_departamento" (change)="setDepartamento()" placeholder="Escribe aquí" class="form-control form-select p-0" name="proveedor.cod_departamento">
                            <ng-option *ngFor="let departamento of departamentos" [value]="departamento.cod">
                                {{ departamento.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-6 col-lg-4" *ngIf="proveedor.tipo == 'Persona'">
                        <label for="distrito">Distrito:</label>
                        <input *ngIf="apiService.auth_user().empresa.pais != 'El Salvador'" type="text" class="form-control" placeholder="Escribe aquí" name="distrito" [(ngModel)]="proveedor.distrito">
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica && apiService.auth_user().empresa.pais == 'El Salvador'" type="text" class="form-control" placeholder="Escribe aquí" name="distrito" [(ngModel)]="proveedor.distrito">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica && apiService.auth_user().empresa.pais == 'El Salvador'" [(ngModel)]="proveedor.cod_distrito" (change)="setDistrito()" placeholder="Escribe aquí" class="form-control form-select p-0" name="proveedor.cod_distrito">
                            <ng-option *ngFor="let distrito of distritos | filter:'cod_departamento':proveedor.cod_departamento" [value]="distrito.cod">
                                {{ distrito.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-6 col-lg-4" *ngIf="proveedor.tipo == 'Persona'">
                        <label for="municipio">Municipio:</label>
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica" type="text" class="form-control" placeholder="Escribe aquí" name="municipio" [(ngModel)]="proveedor.municipio">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica" [(ngModel)]="proveedor.cod_municipio" (change)="setMunicipio()" placeholder="Escribe aquí" class="form-control form-select p-0" name="proveedor.cod_municipio">
                            <ng-option *ngFor="let municipio of municipios | filter:'nombre_departamento':proveedor.departamento" [value]="municipio.cod">
                                {{ municipio.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-12 col-md-6" *ngIf="proveedor.tipo == 'Persona'">
                        <label for="direccion">Dirección:</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="direccion" [(ngModel)]="proveedor.direccion">
                    </div>
                    <div class="form-group col-lg-6">
                        <label for="etiquetas">Etiquetas:</label>
                        <tag-input theme='bootstrap' secondaryPlaceholder="Etiquetas" [placeholder]="'etiquetas'" [separatorKeyCodes]="[32]" [(ngModel)]="proveedor.etiquetas" name="etiquetas"></tag-input>
                    </div>
                    <div class="form-group col-lg-6">
                        <label for="nota">Observaciones</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="nota" [(ngModel)]="proveedor.nota">
                    </div>
                </div>
            </div>
            <div class="col-12" *ngIf="proveedor.tipo == 'Empresa'" [ngClass]="{ 'order-1' :  proveedor.tipo == 'Empresa', 'order-2' :  proveedor.tipo == 'Persona' }">
                <div class="row">
                    <h6 class="col-12 pb-2 mb-2">Información de la empresa</h6>

                    <div class="form-group col-6 col-lg-6">
                        <label for="nombre_empresa">Empresa:</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="nombre_empresa" [(ngModel)]="proveedor.nombre_empresa">
                    </div>
                    <div class="form-group col-6 col-lg-3">
                        <label for="nit">NIT:</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="nit" [(ngModel)]="proveedor.nit">
                    </div>
                    <div class="form-group col-6 col-lg-3">
                        <label for="ncr">NRC:</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="ncr" [(ngModel)]="proveedor.ncr">
                    </div>
                    <div class="form-group col-md-6 col-lg-3">
                        <label for="tipo_contribuyente">Tipo de contribuyente:</label>
                        <select class="form-select" [(ngModel)]="proveedor.tipo_contribuyente" name="tipo_contribuyente">
                            <option value="">Seleccione aquí</option>
                            <option value="Pequeño">Pequeño</option>
                            <option value="Mediano">Mediano</option>
                            <option value="Grande">Grande</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group col-6 col-lg-9">
                        <label for="giro">Giro:</label>
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica" type="text" class="form-control" placeholder="Escribe aquí" name="giro" [(ngModel)]="proveedor.giro">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica" [(ngModel)]="proveedor.cod_giro" (change)="setGiro()" placeholder="Escribe aquí" class="form-select p-0" name="proveedor.cod_giro">
                            <ng-option *ngFor="let actividad_economica of actividad_economicas" [value]="actividad_economica.cod">
                                {{ actividad_economica.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-6 col-lg-3">
                        <label for="telefono">Teléfono:</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="empresa_telefono" [(ngModel)]="proveedor.empresa_telefono">
                    </div>
                    <div class="form-group col-6 col-lg-3" *ngIf="proveedor.tipo == 'Empresa'">
                        <label for="pais">Pais:</label>
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica" type="text" class="form-control" placeholder="Escribe aquí" name="pais" [(ngModel)]="proveedor.pais">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica" [(ngModel)]="proveedor.cod_pais" (change)="setPais()" placeholder="Escribe aquí" class="form-control form-select p-0" name="proveedor.cod_pais">
                            <ng-option *ngFor="let pais of paises" [value]="pais.cod">
                                {{ pais.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-6 col-lg-3" *ngIf="proveedor.tipo == 'Empresa'">
                        <label for="departamento">Departamento:</label>
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica" type="text" class="form-control" placeholder="Escribe aquí" name="departamento" [(ngModel)]="proveedor.departamento">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica" [(ngModel)]="proveedor.cod_departamento" (change)="setDepartamento()" placeholder="Escribe aquí" class="form-control form-select p-0" name="proveedor.cod_departamento">
                            <ng-option *ngFor="let departamento of departamentos" [value]="departamento.cod">
                                {{ departamento.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-6 col-lg-3" *ngIf="proveedor.tipo == 'Empresa'">
                        <label for="distrito">Distrito:</label>
                        <input *ngIf="apiService.auth_user().empresa.pais != 'El Salvador'" type="text" class="form-control" placeholder="Escribe aquí" name="distrito" [(ngModel)]="proveedor.distrito">
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica && apiService.auth_user().empresa.pais == 'El Salvador'" type="text" class="form-control" placeholder="Escribe aquí" name="distrito" [(ngModel)]="proveedor.distrito">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica && apiService.auth_user().empresa.pais == 'El Salvador'" [(ngModel)]="proveedor.cod_distrito" (change)="setDistrito()" placeholder="Escribe aquí" class="form-control form-select p-0" name="proveedor.cod_distrito">
                            <ng-option *ngFor="let distrito of distritos | filter:'cod_departamento':proveedor.cod_departamento" [value]="distrito.cod">
                                {{ distrito.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-6 col-lg-3" *ngIf="proveedor.tipo == 'Empresa'">
                        <label for="municipio">Municipio:</label>
                        <input *ngIf="!apiService.auth_user().empresa.facturacion_electronica" type="text" class="form-control" placeholder="Escribe aquí" name="municipio" [(ngModel)]="proveedor.municipio">
                        <ng-select *ngIf="apiService.auth_user().empresa.facturacion_electronica" [(ngModel)]="proveedor.cod_municipio" (change)="setMunicipio()" placeholder="Escribe aquí" class="form-control form-select p-0" name="proveedor.cod_municipio">
                            <ng-option *ngFor="let municipio of municipios | filter:'nombre_departamento':proveedor.departamento" [value]="municipio.cod">
                                {{ municipio.nombre }}
                            </ng-option>
                        </ng-select>
                    </div>
                    <div class="form-group col-12 col-md-9" *ngIf="proveedor.tipo == 'Empresa'">
                        <label for="direccion">Dirección:</label>
                        <input type="text" class="form-control" placeholder="Escribe aquí" name="direccion" [(ngModel)]="proveedor.direccion">
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="form-group col-md-12 mt-3">
                <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F10" tooltip="Guardar (F10)">
                    <span *ngIf="!saving">Guardar proveedor <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
                    <span *ngIf="saving">Guardando...</span>
                </button>
            </div>
        </div>
    </form>

    </div>
</div>
