<div class="d-flex justify-content-between bg-white rounded p-3 mb-3">
    <h3 (click)="loadAll()">{{ licencia.id ? 'Editar ' : 'Crear ' }} Licencia</h3>
    <button class="btn btn-light text-danger" routerLink="/admin/licencias"><i class="fa fa-arrow-left"></i> Regresar</button>
</div>

<form autocomplete="off" (ngSubmit)="onSubmit()">
    <div class="bg-white rounded p-3">
        <div class="row">
            <div class="form-group col-md-6 col-lg-4">
                <label for="">Empresa:</label>
                <p>{{ licencia.nombre_empresa }}</p>
            </div>
            <div class="form-group col-md-6 col-lg-4">
                <label for="">Fecha de creación:</label>
                <p>{{ licencia.created_at | date:'dd/mm/yyyy' }}</p>
            </div>
            <div class="form-group col-md-6 col-lg-4">
                <label for="">Num Licencias:</label>
                <input type='number' class="form-control" name="num_licencias" [(ngModel)]="licencia.num_licencias"/>
            </div>
        </div>
     </div>

    <div class="bg-white rounded p-3 mb-3">
        <div class="form-group col-sm-12 pt-2 pb-4">
            <button type="submit" [disabled]="saving" class="btn btn-primary float-end tcla-F8" tooltip="Procesar (F8)">
                @if (!saving) {
                    <span>Guardar licencia  <img src="assets/icons/arrow-right-stroke.png" class="icon2 ms-2"></span>
                }
                @if (saving) {
                    <span>Guardando...</span>
                }
            </button>
        </div>
    </div>
</form>

<div class="bg-white rounded p-3 mb-3">
    <div class="col-lg-12">
        <app-licencia-empresas [licencia]='licencia'></app-licencia-empresas>
    </div>
</div>
