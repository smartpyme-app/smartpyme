<div id="full-calendar">  
    <full-calendar  [options]="calendarOptions"></full-calendar>
</div>

<ng-template #mevento>
  <div class="modal-header">
    <h4 class="modal-title text-center">
      <span *ngIf="evento.id">Editar Cita</span>
      <span *ngIf="!evento.id">Crear Cita</span>
    </h4>
    <button type="button" class="btn-close" (click)="modalRef.hide(); this.alertService.modal = false;" aria-label="Close"></button>
  </div>
  <div class="modal-body">
        <app-crear-evento [evento]="evento" (update)="loadAll()"></app-crear-evento>
  </div>
</ng-template>
