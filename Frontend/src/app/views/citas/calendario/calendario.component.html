<section class="d-flex justify-content-between bg-white p-2 p-md-4 rounded mb-3">
  <h2 class="page-heading" style="text-transform: capitalize;">
    <ng-container *ngIf="selectedPeriodType=='day'">
      {{currentDate|date:'MMMM d, yyyy': 'es-ES'}}
    </ng-container>
  </h2>
  <!-- <div>
  </div> -->
</section>
<section>
  <div class="row">
    <div class="col-12 d-flex gap-10 mb-3">
      <button class="btn btn-default" (click)="prevDay()">
        <i class="fa fa-chevron-left"></i>
      </button>
      <button class="btn btn-default" (click)="nextDay()">
        <i class="fa fa-chevron-right"></i>
      </button>
    </div>
    <div class="col-6 d-flex flex-wrap gap-10">
      <div> <button class="btn " (click)="setNowSelection()"
          [ngClass]="selectedPeriodType=='day'?'btn-primary':'btn-default'">
          Hoy
        </button></div>
      <div><button class="btn " (click)="setWeekSelection()"
          [ngClass]="selectedPeriodType=='week'?'btn-primary':'btn-default'">
          Semana
        </button></div>
      <div><button class="btn " (click)="setMonthSelection()"
          [ngClass]="selectedPeriodType=='month'?'btn-primary':'btn-default'">
          Mes
        </button></div>
      <div *ngIf="apiService.auth_user().tipo != 'Ventas'"> <button class="btn " (click)="setYearSelection()"
          [ngClass]="selectedPeriodType=='year'?'btn-primary':'btn-default'">
          Año
        </button></div>
    </div>
    <div class="row col-6">
      <div class="form-group col-12 col-md-4">
        <ng-select name="id_usuario" [(ngModel)]="filtros.id_usuario" class="form-select p-0" placeholder="Encargado"
          (change)="loadAll()">
          <ng-option [value]="usuario.id" *ngFor="let usuario of usuarios">
            {{ usuario.name }}
          </ng-option>
        </ng-select>
      </div>

      <div class="form-group col-12 col-md-4">
        <div class="input-group flex-nowrap">
          <ng-select name="id_cliente" [(ngModel)]="filtros.id_cliente" class="form-select p-0" placeholder="Cliente"
            (change)="loadAll()">
            <ng-option value=""> Seleccione aquí </ng-option>
            <ng-option *ngFor="let cliente of clientes" [value]="cliente.id">
              {{ cliente.tipo == 'Persona' ? cliente.nombre_completo : cliente.nombre_empresa }}
            </ng-option>
          </ng-select>

        </div>
      </div>

      <div class="form-group col-12 col-md-4">
        <div class="input-group flex-nowrap">
          <ng-select name="id_sucursal" [(ngModel)]="filtros.id_sucursal" class="form-select p-0" placeholder="Sucursal"
            (change)="loadAll()">
            <ng-option value=""> Seleccione aquí </ng-option>
            <ng-option *ngFor="let sucursal of sucursales" [value]="sucursal.id">
              {{ sucursal.nombre }}
            </ng-option>
          </ng-select>

        </div>
      </div>
    </div>
  </div>
  <div #fullCalendarContainer>
    <full-calendar #fullcalendar [options]="calendarOptions"></full-calendar>
  </div>
</section>

<ng-template #mevento>
  <div class="modal-header">
    <h4 class="modal-title text-center">
      <span *ngIf="evento.id">Editar Cita</span>
      <span *ngIf="!evento.id">Crear Cita</span>
    </h4>
    <button type="button" class="btn-close" (click)="modalRef.hide(); this.alertService.modal = false;"
      aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-crear-evento [evento]="evento" (update)="loadAll()"></app-crear-evento>
  </div>
</ng-template>
