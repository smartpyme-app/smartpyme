name: User sees error message when logging in with invalid credentials
page: /login
page_path: src/app/auth/login/login.component.ts
task: Verify error handling displays appropriate message for incorrect login credentials
steps:
  - Navigate to login page
  - Enter invalid email address in email field
  - Enter invalid password in password field
  - Click "Iniciar sesión" button
  - Verify error message is displayed
  - Verify login form shows shake animation
  - Verify user remains on login page
expected_result: Error message appears indicating incorrect credentials, form animates with shake effect, and user stays on login page

