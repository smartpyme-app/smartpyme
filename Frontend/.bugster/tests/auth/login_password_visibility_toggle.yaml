name: User can toggle password visibility on login form
page: /login
page_path: src/app/auth/login/login.component.ts
task: Verify password visibility toggle button works correctly
steps:
  - Navigate to login page
  - Enter password in password field
  - Verify password is hidden by default (shows dots or asterisks)
  - Verify eye icon with slash is visible
  - Click password visibility toggle button
  - Verify password text is now visible
  - Verify eye icon changes to show open eye
  - Click toggle button again
  - Verify password is hidden again
expected_result: Password visibility toggles between hidden and visible states, and eye icon updates accordingly

