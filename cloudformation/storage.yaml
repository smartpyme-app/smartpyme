AWSTemplateFormatVersion: '2010-09-09'
Description: 'SmartPyme Storage - S3 Bucket and CloudFront Distribution'

Parameters:
  Environment:
    Type: String
    Description: Environment name
    AllowedValues:
      - dev
      - prod
    Default: dev

Resources:
  # S3 Bucket for Assets
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'smartpyme-assets-${Environment}-${AWS::AccountId}'
      Tags:
        - Key: Project
          Value: NOVA

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'smartpyme-oac-${Environment}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'SmartPyme Assets Distribution - ${Environment}'
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            OriginPath: /public
            S3OriginConfig: {}
            OriginAccessControlId: !Ref CloudFrontOAC
        PriceClass: PriceClass_100
      Tags:
        - Key: Project
          Value: NOVA

  # S3 Bucket Policy for CloudFront OAC
  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: 's3:GetObject'
            Resource: !Sub '${AssetsBucket.Arn}/public/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

Outputs:
  AssetsBucketName:
    Description: Assets S3 Bucket Name
    Value: !Ref AssetsBucket
    Export:
      Name: smartpyme-assets-bucket-name

  AssetsBucketArn:
    Description: Assets S3 Bucket ARN
    Value: !GetAtt AssetsBucket.Arn
    Export:
      Name: smartpyme-assets-bucket-arn

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: smartpyme-cloudfront-distribution-id

  CloudFrontDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: smartpyme-cloudfront-domain-name