AWSTemplateFormatVersion: '2010-09-09'
Description: 'SmartPyme Secrets Manager and SSM Parameter Store Resources'

Parameters:
  DatabaseHost:
    Type: String
    Description: Database host endpoint
    NoEcho: false
  
  DatabaseName:
    Type: String
    Description: Database name
    Default: smartpyme
    NoEcho: false
  
  DatabaseUsername:
    Type: String
    Description: Database username
    NoEcho: false
  
  DatabasePassword:
    Type: String
    Description: Database password
    NoEcho: true

  # Stripe Parameters
  StripeKey:
    Type: String
    Description: Stripe API key
    NoEcho: true
    Default: ""
  
  StripeSecret:
    Type: String
    Description: Stripe secret key
    NoEcho: true
    Default: ""

  # N1co Parameters
  NicoApiKey:
    Type: String
    Description: N1co API key
    NoEcho: true
    Default: ""
  
  NicoClientSecret:
    Type: String
    Description: N1co client secret
    NoEcho: true
    Default: ""
  
  NicoSandboxApiKey:
    Type: String
    Description: N1co sandbox API key
    NoEcho: true
    Default: ""
  
  NicoWebhookSecret:
    Type: String
    Description: N1co webhook secret
    NoEcho: true
    Default: ""

  # WhatsApp Parameters
  WhatsAppAccessToken:
    Type: String
    Description: WhatsApp Business API access token
    NoEcho: true
    Default: ""
  
  WhatsAppVerifyToken:
    Type: String
    Description: WhatsApp webhook verify token
    NoEcho: true
    Default: "smartpyme_verify_token"

  # Shopify Parameters
  ShopifyWebhookSecret:
    Type: String
    Description: Shopify webhook secret
    NoEcho: true
    Default: ""

  # Mailgun Parameters
  MailgunSecret:
    Type: String
    Description: Mailgun API secret
    NoEcho: true
    Default: ""

  # Google OAuth Parameters
  GoogleClientSecret:
    Type: String
    Description: Google OAuth client secret
    NoEcho: true
    Default: ""

  # Facebook OAuth Parameters
  FacebookClientSecret:
    Type: String
    Description: Facebook OAuth client secret
    NoEcho: true
    Default: ""

  # Postmark Parameters
  PostmarkToken:
    Type: String
    Description: Postmark API token
    NoEcho: true
    Default: ""

  # Bedrock Parameters
  BedrockKey:
    Type: String
    Description: AWS Bedrock access key
    NoEcho: true
    Default: ""
  
  BedrockSecret:
    Type: String
    Description: AWS Bedrock secret key
    NoEcho: true
    Default: ""

  # Mail Service Parameters
  MailUsername:
    Type: String
    Description: Mail service username
    NoEcho: true
  
  MailPassword:
    Type: String
    Description: Mail service password
    NoEcho: true

  # Redis Parameters
  RedisPassword:
    Type: String
    Description: Redis password
    NoEcho: true
    Default: ""

  # Pusher Parameters
  PusherSecret:
    Type: String
    Description: Pusher service secret
    NoEcho: true
    Default: ""

  # JWT Parameters
  JWTSecretValue:
    Type: String
    Description: JWT secret for authentication
    NoEcho: true
    Default: ""

Resources:
  # Database Credentials Secret
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/database-credentials
      Description: Database credentials for SmartPyme
      SecretString: !Sub |
        {
          "username": "${DatabaseUsername}",
          "password": "${DatabasePassword}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  # Database Configuration Parameters
  DatabaseHostParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /smartpyme/database/host
      Type: String
      Value: !Ref DatabaseHost
      Description: Database host endpoint
      Tags:
        Project: NOVA

  DatabaseNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /smartpyme/database/name
      Type: String
      Value: !Ref DatabaseName
      Description: Database name
      Tags:
        Project: NOVA

  # Third Party Services Secrets (empty - to be populated manually)
  StripeServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/stripe
      Description: Stripe payment credentials
      SecretString: !Sub |
        {
          "key": "${StripeKey}",
          "secret": "${StripeSecret}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  NicoServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/nico
      Description: N1co payment service credentials
      SecretString: !Sub |
        {
          "api_key": "${NicoApiKey}",
          "client_secret": "${NicoClientSecret}",
          "sandbox_api_key": "${NicoSandboxApiKey}",
          "webhook_secret": "${NicoWebhookSecret}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  WhatsAppServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/whatsapp
      Description: WhatsApp Business API credentials
      SecretString: !Sub |
        {
          "access_token": "${WhatsAppAccessToken}",
          "verify_token": "${WhatsAppVerifyToken}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  ShopifyServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/shopify
      Description: Shopify webhook credentials
      SecretString: !Sub |
        {
          "webhook_secret": "${ShopifyWebhookSecret}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  MailgunServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/mailgun
      Description: Mailgun email service credentials
      SecretString: !Sub |
        {
          "secret": "${MailgunSecret}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  GoogleOAuthServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/google
      Description: Google OAuth credentials
      SecretString: !Sub |
        {
          "client_secret": "${GoogleClientSecret}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  FacebookOAuthServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/facebook
      Description: Facebook OAuth credentials
      SecretString: !Sub |
        {
          "client_secret": "${FacebookClientSecret}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  PostmarkServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/postmark
      Description: Postmark email service credentials
      SecretString: !Sub |
        {
          "token": "${PostmarkToken}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  BedrockServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/bedrock
      Description: AWS Bedrock AI service credentials
      SecretString: !Sub |
        {
          "key": "${BedrockKey}",
          "secret": "${BedrockSecret}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  MailServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/mail
      Description: Mail service credentials
      SecretString: !Sub |
        {
          "username": "${MailUsername}",
          "password": "${MailPassword}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  RedisServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/redis
      Description: Redis service credentials
      SecretString: !Sub |
        {
          "password": "${RedisPassword}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  PusherServiceSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/config/services/pusher
      Description: Pusher service secret
      SecretString: !Sub |
        {
          "secret": "${PusherSecret}"
        }
      Tags:
        - Key: Project
          Value: NOVA

  CronApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/cron-api-key
      Description: API Key for SmartPyme cron endpoints
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: 'api_key'
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Project
          Value: NOVA

  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/jwt-secret
      Description: JWT secret for SmartPyme authentication
      SecretString: !Sub |
        {
          "secret": "${JWTSecretValue}"
        }
      Tags:
        - Key: Project
          Value: NOVA

Outputs:
  # Database Secret Export
  DatabaseSecretArn:
    Description: Database Secret ARN
    Value: !Ref DatabaseSecret
    Export:
      Name: smartpyme-database-secret-arn

  # Database Parameters Exports
  DatabaseHostParameterName:
    Description: Database Host Parameter Name
    Value: !Ref DatabaseHostParameter
    Export:
      Name: smartpyme-database-host-parameter

  DatabaseNameParameterName:
    Description: Database Name Parameter Name
    Value: !Ref DatabaseNameParameter
    Export:
      Name: smartpyme-database-name-parameter

  # Cron API Key Secret Export
  CronApiKeySecretArn:
    Description: Cron API Key Secret ARN
    Value: !Ref CronApiKeySecret
    Export:
      Name: smartpyme-cron-api-key-secret-arn

  # JWT Secret Export
  JWTSecretArn:
    Description: JWT Secret ARN
    Value: !Ref JWTSecret
    Export:
      Name: smartpyme-jwt-secret-arn

  # Third Party Services Secrets Exports
  StripeSecretArn:
    Description: Stripe Service Secret ARN
    Value: !Ref StripeServiceSecret
    Export:
      Name: smartpyme-stripe-secret-arn

  NicoSecretArn:
    Description: N1co Service Secret ARN
    Value: !Ref NicoServiceSecret
    Export:
      Name: smartpyme-nico-secret-arn

  WhatsAppSecretArn:
    Description: WhatsApp Service Secret ARN
    Value: !Ref WhatsAppServiceSecret
    Export:
      Name: smartpyme-whatsapp-secret-arn

  ShopifySecretArn:
    Description: Shopify Service Secret ARN
    Value: !Ref ShopifyServiceSecret
    Export:
      Name: smartpyme-shopify-secret-arn

  MailgunSecretArn:
    Description: Mailgun Service Secret ARN
    Value: !Ref MailgunServiceSecret
    Export:
      Name: smartpyme-mailgun-secret-arn

  GoogleSecretArn:
    Description: Google OAuth Service Secret ARN
    Value: !Ref GoogleOAuthServiceSecret
    Export:
      Name: smartpyme-google-secret-arn

  FacebookSecretArn:
    Description: Facebook OAuth Service Secret ARN
    Value: !Ref FacebookOAuthServiceSecret
    Export:
      Name: smartpyme-facebook-secret-arn

  PostmarkSecretArn:
    Description: Postmark Service Secret ARN
    Value: !Ref PostmarkServiceSecret
    Export:
      Name: smartpyme-postmark-secret-arn

  BedrockSecretArn:
    Description: Bedrock Service Secret ARN
    Value: !Ref BedrockServiceSecret
    Export:
      Name: smartpyme-bedrock-secret-arn

  MailSecretArn:
    Description: Mail Service Secret ARN
    Value: !Ref MailServiceSecret
    Export:
      Name: smartpyme-mail-secret-arn

  RedisSecretArn:
    Description: Redis Service Secret ARN
    Value: !Ref RedisServiceSecret
    Export:
      Name: smartpyme-redis-secret-arn

  PusherSecretArn:
    Description: Pusher Service Secret ARN
    Value: !Ref PusherServiceSecret
    Export:
      Name: smartpyme-pusher-secret-arn