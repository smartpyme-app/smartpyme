AWSTemplateFormatVersion: '2010-09-09'
Description: 'SmartPyme Laravel Web App Runner Service with ECR Auto-deployment'

Parameters:
  ECRRepositoryURI:
    Type: String
    Description: ECR Repository URI (e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com/smartpyme-backend)
  
  AppKey:
    Type: String
    Description: Laravel APP_KEY (base64:xxxxx format)
    NoEcho: true
  
  FrontendUrl:
    Type: String
    Description: Frontend URL for CORS configuration (e.g., https://smartpyme-frontend.com)
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where RDS is located
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs where RDS is located (minimum 2)
  
  RDSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group ID of the RDS instance

Resources:
  # Create APP_KEY secret
  AppKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: smartpyme/app-key
      Description: Laravel APP_KEY for SmartPyme application
      SecretString: !Ref AppKey
      Tags:
        - Key: Project
          Value: NOVA
  # Security Group for App Runner
  AppRunnerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App Runner access to RDS
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          DestinationSecurityGroupId: !Ref RDSSecurityGroupId
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS for AWS APIs
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP for general internet access
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
          Description: DNS resolution
      Tags:
        - Key: Project
          Value: NOVA

  # VPC Connector
  VpcConnector:
    Type: AWS::AppRunner::VpcConnector
    Properties:
      VpcConnectorName: smartpyme-vpc-connector
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref AppRunnerSecurityGroup
      Tags:
        - Key: Project
          Value: NOVA

  # IAM Role for App Runner
  AppRunnerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSSendOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !ImportValue smartpyme-queue-arn
                  - !ImportValue smartpyme-daily-reports-queue-arn
                  - !ImportValue smartpyme-invoice-processing-queue-arn
                  - !ImportValue smartpyme-shopify-sync-queue-arn
                  - !ImportValue smartpyme-email-notifications-queue-arn
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue smartpyme-cron-api-key-secret-arn
                  - !ImportValue smartpyme-database-secret-arn
                  - !Ref AppKeySecret
        - PolicyName: ParameterStoreAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/smartpyme/database/host'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/smartpyme/database/name'
      Tags:
        - Key: Project
          Value: NOVA

  # IAM Role for ECR Access
  ECRAccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess
      Tags:
        - Key: Project
          Value: NOVA

  # App Runner Service
  WebAppRunnerService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: smartpyme-web-app
      SourceConfiguration:
        ImageRepository:
          ImageIdentifier: !Sub '${ECRRepositoryURI}:latest'
          ImageConfiguration:
            Port: '80'
            RuntimeEnvironmentVariables:
              - Name: APP_NAME
                Value: SmartPyme
              - Name: APP_ENV
                Value: production
              - Name: APP_DEBUG
                Value: 'false'
              - Name: LOG_CHANNEL
                Value: stderr
              - Name: LOG_LEVEL
                Value: info
              - Name: QUEUE_CONNECTION
                Value: sqs
              - Name: AWS_DEFAULT_REGION
                Value: !Ref AWS::Region
              - Name: FRONTEND_URL
                Value: !Ref FrontendUrl
              - Name: APP_KEY_SECRET_NAME
                Value: smartpyme/app-key

              - Name: SQS_QUEUE
                Value: !ImportValue smartpyme-queue-name
              - Name: SQS_EMAIL_QUEUE
                Value: !ImportValue smartpyme-email-queue-name
              - Name: SQS_SYNC_QUEUE
                Value: !ImportValue smartpyme-sync-queue-name
              - Name: SQS_REPORTS_QUEUE
                Value: !ImportValue smartpyme-reports-queue-name
              - Name: SQS_INVOICE_QUEUE
                Value: !ImportValue smartpyme-invoice-processing-queue-name
              - Name: CRON_API_KEY_SECRET_ARN
                Value: !ImportValue smartpyme-cron-api-key-secret-arn

          ImageRepositoryType: ECR
        AutoDeploymentsEnabled: true
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt ECRAccessRole.Arn
      InstanceConfiguration:
        Cpu: 0.25 vCPU
        Memory: 0.5 GB
        InstanceRoleArn: !GetAtt AppRunnerRole.Arn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: VPC
          VpcConnectorArn: !GetAtt VpcConnector.VpcConnectorArn
      Tags:
        - Key: Project
          Value: NOVA

Outputs:
  ServiceUrl:
    Description: SmartPyme Web App Runner Service URL
    Value: !Sub 'https://${WebAppRunnerService.ServiceUrl}'
    Export:
      Name: !Sub '${AWS::StackName}-ServiceUrl'
  
  ServiceArn:
    Description: SmartPyme Web App Runner Service ARN
    Value: !Ref WebAppRunnerService
    Export:
      Name: !Sub '${AWS::StackName}-ServiceArn'
  
  VpcConnectorArn:
    Description: VPC Connector ARN for sharing
    Value: !GetAtt VpcConnector.VpcConnectorArn
    Export:
      Name: smartpyme-vpc-connector-arn