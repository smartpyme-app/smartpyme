version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=smartpyme
      - DB_USERNAME=smartpyme
      - DB_PASSWORD=${DB_PASSWORD}
      - QUEUE_CONNECTION=database
      - FRONTEND_URL=http://localhost:4200
    volumes:
      - storage_data:/var/www/html/storage/app
    depends_on:
      - db
    networks:
      - smartpyme

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=smartpyme
      - MYSQL_USER=smartpyme
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - smartpyme

volumes:
  mysql_data:
  storage_data:

networks:
  smartpyme:
    driver: bridge